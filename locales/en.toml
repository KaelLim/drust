# v1.22 i18n bundle
#
# This file is the source of truth for translation keys. Editing rules:
#  - Adding a key: add it here, then reference via `{{ t.s("key") }}` in a template;
#    build.rs validates the round-trip on every `cargo build`.
#  - Removing a key: remove from all templates first, OR accept the orphan
#    cargo:warning that build.rs will emit on next build.
#  - Renaming: rename across templates + this file in the same commit, OR
#    take the orphan warning intentionally for a deprecation window.
#  - zh-TW.toml: missing keys fall back to en.toml at runtime; never has keys
#    NOT in en.toml (en.toml is the source of truth — build.rs warns on dead
#    zh-TW keys).
#
# Naming conventions (K1 + K2 hybrid):
#  - Page-specific: <filename_stem>.<section>.<role>  e.g. tenants_list.empty.title
#  - Reused:        common.<group>.<role>             e.g. common.button.copy
#
# Required: _meta.sentinel = "ok" — init_bundles validates this at startup.

[_meta]
sentinel = "ok"

# =====================================================================
# common.* - reused across templates
# =====================================================================

# DIVERGENCE: common.action.* preserved alongside common.button.* because the
# values differ in case (e.g. "Apply" vs "apply"). Fold once templates pick a
# single canonical capitalisation. See Theme E3 review (2026-05-22).
[common.action]
apply = "Apply"
cancel = "cancel"
reset = "reset"
save = "save"

# DIVERGENCE: common.actions.cancel/copy/save preserved alongside common.button.*
# due to case differences ("cancel" vs "Cancel" etc). create/delete/edit folded
# into common.button.*.
