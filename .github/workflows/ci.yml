name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-test-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      # NEVER add --release here. Cargo.toml [profile.release] sets
      # LTO + codegen-units=1, making --release tests hang 40+ minutes.
      - name: cargo test --lib
        run: cargo test --lib

      - name: Install cargo-audit
        # Must be >= 0.22 (→ rustsec 0.33 → cvss ^2.2). The advisory DB is
        # fetched fresh each run and now ships CVSS 4.0 vectors (e.g.
        # RUSTSEC-2026-0124). The cvss crate only parses v4.0 from 2.1.0 on;
        # older cargo-audit (0.20/0.21) rejects the ENTIRE DB with
        # "unsupported CVSS version: 4.0" — even for advisories that don't
        # touch our deps. Do not downgrade this pin.
        run: cargo install cargo-audit --locked --version ^0.22

      - name: cargo audit
        run: cargo audit
