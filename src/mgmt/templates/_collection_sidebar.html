<!-- _collection_sidebar.html — left-side collection nav for the detail page.
     Parent scope must provide: tenant_id: String, collections: Vec<Collection>, active_coll: String.
     `active_coll` accepts collection names plus the virtual entries
     `_api_keys`, `_rpc`, `_system_files`, `_system_users`,
     `_oauth_providers`, `_webhooks`, and `_logs`. -->
<aside class="sidebar">
  <div class="sidebar-head">
    <span>collections</span>
    <span class="count">{{ collections.len() }}</span>
  </div>
  <nav class="sidebar-list">
    <a class="col-item{% if active_coll == "_api_keys" %} on{% endif %}"
       href="/drust/admin/tenants/{{ tenant_id }}/_api_keys"
       title="_api_keys (anon · service · MCP)">
      <span class="arrow" style="opacity:.7;">🔑</span>
      <span>_api_keys</span>
    </a>
    <a class="col-item{% if active_coll == "_rpc" %} on{% endif %}"
       href="/drust/admin/tenants/{{ tenant_id }}/_rpc"
       title="_rpc (stored functions · Supabase-style)">
      <span class="arrow" style="opacity:.7;">⚡</span>
      <span>_rpc</span>
    </a>
    <a class="col-item{% if active_coll == "_system_files" %} on{% endif %}"
       href="/drust/admin/tenants/{{ tenant_id }}/files"
       title="_system_files (file storage)">
      <span class="arrow" style="opacity:.7;">🔒</span>
      <span>_system_files</span>
    </a>
    <a class="col-item{% if active_coll == "_system_users" %} on{% endif %}"
       href="/drust/admin/tenants/{{ tenant_id }}/collections/_system_users"
       title="_system_users (registered users)">
      <span class="arrow" style="opacity:.7;">👤</span>
      <span>_system_users</span>
    </a>
    <a class="col-item{% if active_coll == "_oauth_providers" %} on{% endif %}"
       href="/drust/admin/tenants/{{ tenant_id }}/_oauth_providers"
       title="_oauth_providers (per-tenant Google/GitHub OAuth configs)">
      <span class="arrow" style="opacity:.7;">🔐</span>
      <span>_oauth_providers</span>
    </a>
    <a class="col-item{% if active_coll == "_webhooks" %} on{% endif %}"
       href="/drust/admin/tenants/{{ tenant_id }}/_webhooks"
       title="_webhooks (outbound webhook subscriptions)">
      <span class="arrow" style="opacity:.7;">🔔</span>
      <span>_webhooks</span>
    </a>
    <a class="col-item{% if active_coll == "_logs" %} on{% endif %}"
       href="/drust/admin/tenants/{{ tenant_id }}/_logs"
       title="_logs (audit · request history)">
      <span class="arrow" style="opacity:.7;">📋</span>
      <span>_logs</span>
    </a>
    {% for c in collections %}
    <a class="col-item{% if c.name == active_coll %} on{% endif %}"
       href="/drust/admin/tenants/{{ tenant_id }}/collections/{{ c.name }}">
      <span class="arrow">▸</span>
      <span>{{ c.name }}</span>
    </a>
    {% endfor %}
  </nav>
</aside>
