<style>
  /* ============================================================
     drust admin · shared stylesheet
     Source-of-truth: 2026-05-17 open-design mockup `shared.css`.
     Web fonts loaded from Google Fonts. The trailing
     "drust compat" block maps legacy class names that templates
     still emit (.btn-primary, .data, .field, .alert, …) onto
     mockup equivalents so we don't have to sweep every template.
     ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap');

  {# v1.23 — :root colours are theme-driven. Static (cozy-dark / soft-light)
     emit a single :root block; System emits a light :root + an @media
     (prefers-color-scheme: dark) override. Fonts + radii are theme-
     independent so they live outside the match. #}
  {% match palette_resolved %}
  {% when crate::mgmt::theme::ResolvedPalette::Static with (p) %}
  :root{
    --bg:{{ p.ui["bg"] }};
    --bg-deep:{{ p.ui["bg-deep"] }};
    --surface:{{ p.ui["surface"] }};
    --surface-2:{{ p.ui["surface-2"] }};
    --surface-3:{{ p.ui["surface-3"] }};
    --border:{{ p.ui["border"] }};
    --border-mid:{{ p.ui["border-mid"] }};
    --border-strong:{{ p.ui["border-strong"] }};
    --fg:{{ p.ui["fg"] }};
    --fg-2:{{ p.ui["fg-2"] }};
    --muted:{{ p.ui["muted"] }};
    --muted-2:{{ p.ui["muted-2"] }};

    --accent:{{ p.accent["accent"] }};
    --accent-2:{{ p.accent["accent-2"] }};
    --accent-soft:{{ p.accent["accent-soft"] }};
    --accent-border:{{ p.accent["accent-border"] }};
    --rust:{{ p.accent["rust"] }};

    --warn:{{ p.accent["warn"] }};          --warn-soft:rgba(241,194,122,0.13);   --warn-border:rgba(241,194,122,0.34);
    --danger:{{ p.accent["danger"] }};      --danger-soft:rgba(232,138,138,0.14); --danger-border:rgba(232,138,138,0.34);
    --info:{{ p.accent["info"] }};          --info-soft:rgba(165,184,240,0.13);   --info-border:rgba(165,184,240,0.34);
    --mint:{{ p.accent["mint"] }};          --mint-soft:rgba(158,211,184,0.13);   --mint-border:rgba(158,211,184,0.34);
    --lilac:{{ p.accent["lilac"] }};        --lilac-soft:rgba(201,168,227,0.14);  --lilac-border:rgba(201,168,227,0.34);
  }
  {% when crate::mgmt::theme::ResolvedPalette::System with (sys) %}
  :root{
    --bg:{{ sys.light.ui["bg"] }};
    --bg-deep:{{ sys.light.ui["bg-deep"] }};
    --surface:{{ sys.light.ui["surface"] }};
    --surface-2:{{ sys.light.ui["surface-2"] }};
    --surface-3:{{ sys.light.ui["surface-3"] }};
    --border:{{ sys.light.ui["border"] }};
    --border-mid:{{ sys.light.ui["border-mid"] }};
    --border-strong:{{ sys.light.ui["border-strong"] }};
    --fg:{{ sys.light.ui["fg"] }};
    --fg-2:{{ sys.light.ui["fg-2"] }};
    --muted:{{ sys.light.ui["muted"] }};
    --muted-2:{{ sys.light.ui["muted-2"] }};

    --accent:{{ sys.light.accent["accent"] }};
    --accent-2:{{ sys.light.accent["accent-2"] }};
    --accent-soft:{{ sys.light.accent["accent-soft"] }};
    --accent-border:{{ sys.light.accent["accent-border"] }};
    --rust:{{ sys.light.accent["rust"] }};

    --warn:{{ sys.light.accent["warn"] }};      --warn-soft:rgba(241,194,122,0.13);   --warn-border:rgba(241,194,122,0.34);
    --danger:{{ sys.light.accent["danger"] }};  --danger-soft:rgba(232,138,138,0.14); --danger-border:rgba(232,138,138,0.34);
    --info:{{ sys.light.accent["info"] }};      --info-soft:rgba(165,184,240,0.13);   --info-border:rgba(165,184,240,0.34);
    --mint:{{ sys.light.accent["mint"] }};      --mint-soft:rgba(158,211,184,0.13);   --mint-border:rgba(158,211,184,0.34);
    --lilac:{{ sys.light.accent["lilac"] }};    --lilac-soft:rgba(201,168,227,0.14);  --lilac-border:rgba(201,168,227,0.34);
  }
  @media (prefers-color-scheme: dark) {
    :root{
      --bg:{{ sys.dark.ui["bg"] }};
      --bg-deep:{{ sys.dark.ui["bg-deep"] }};
      --surface:{{ sys.dark.ui["surface"] }};
      --surface-2:{{ sys.dark.ui["surface-2"] }};
      --surface-3:{{ sys.dark.ui["surface-3"] }};
      --border:{{ sys.dark.ui["border"] }};
      --border-mid:{{ sys.dark.ui["border-mid"] }};
      --border-strong:{{ sys.dark.ui["border-strong"] }};
      --fg:{{ sys.dark.ui["fg"] }};
      --fg-2:{{ sys.dark.ui["fg-2"] }};
      --muted:{{ sys.dark.ui["muted"] }};
      --muted-2:{{ sys.dark.ui["muted-2"] }};

      --accent:{{ sys.dark.accent["accent"] }};
      --accent-2:{{ sys.dark.accent["accent-2"] }};
      --accent-soft:{{ sys.dark.accent["accent-soft"] }};
      --accent-border:{{ sys.dark.accent["accent-border"] }};
      --rust:{{ sys.dark.accent["rust"] }};

      --warn:{{ sys.dark.accent["warn"] }};       --warn-soft:rgba(241,194,122,0.13);   --warn-border:rgba(241,194,122,0.34);
      --danger:{{ sys.dark.accent["danger"] }};   --danger-soft:rgba(232,138,138,0.14); --danger-border:rgba(232,138,138,0.34);
      --info:{{ sys.dark.accent["info"] }};       --info-soft:rgba(165,184,240,0.13);   --info-border:rgba(165,184,240,0.34);
      --mint:{{ sys.dark.accent["mint"] }};       --mint-soft:rgba(158,211,184,0.13);   --mint-border:rgba(158,211,184,0.34);
      --lilac:{{ sys.dark.accent["lilac"] }};     --lilac-soft:rgba(201,168,227,0.14);  --lilac-border:rgba(201,168,227,0.34);
    }
  }
  {% endmatch %}

  :root{
    --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;
    --font-display:'Newsreader','Iowan Old Style','Charter',Georgia,serif;
    --font-mono:'JetBrains Mono','Source Code Pro','SF Mono',Menlo,monospace;

    --r-sm:8px; --r-md:12px; --r-lg:14px; --r-xl:18px; --r-pill:9999px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:var(--font-sans);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  /* body scrolls naturally; sidebar/topbar use position:sticky to stay in
     view. Earlier overflow:hidden + .main { overflow-y:auto } trapped long
     pages because the grid row's intrinsic min-height grew with content. */
  body{min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  ::selection{background:var(--accent-soft);color:var(--fg)}
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:10px;border:2px solid var(--bg)}
  *::-webkit-scrollbar-thumb:hover{background:var(--muted-2)}

  .mono{font-family:var(--font-mono);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted)}
  .kbd{font-family:var(--font-mono);font-size:10.5px;border:1px solid var(--border-strong);padding:1px 6px;border-radius:6px;color:var(--fg-2);background:var(--bg-deep)}

  /* ---------------- app shell ---------------- */
  /* min-height so it can grow with content; let body do the scrolling. */
  .app-shell{display:grid;grid-template-columns:248px minmax(0,1fr);min-height:100vh}

  /* legacy macwin wrappers — neutralised so any stale include is a no-op */
  .macwin,.macwin-body{display:contents}
  .macwin-title{display:none}

  /* ---------------- LiveChonk pixel mascot ---------------- */
  .chonk{display:inline-block;line-height:0;flex-shrink:0}
  .chonk svg{display:block;shape-rendering:crispEdges;image-rendering:pixelated}
  .chonk-blink{animation:chonk-blink 5.2s ease-in-out infinite}
  @keyframes chonk-blink{0%,92%,100%{transform:scaleY(1)}94%,98%{transform:scaleY(0.1)}}
  /* drust templates apply `.bounce` directly; mockup uses `.chonk-bounce`. Both
     alias to the same keyframes so either class works. */
  .chonk-bounce,.bounce{animation:chonk-bounce 2.4s ease-in-out infinite}
  @keyframes chonk-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

  /* ---------------- sidebar (shared) ---------------- */
  /* Three class shapes used across templates:
       .sidebar              (mockup base)
       .sidebar.sidebar-admin (host admin pages, _admin_sidebar.html)
       .tenant-sidebar       (per-tenant pages, _collection_sidebar.html)
     All three get the same shell: flex-column, 100vh, sticky to body scroll,
     align-self:start so the grid item doesn't stretch and kill sticky. */
  .sidebar,.sidebar-admin,.tenant-sidebar{
    background:var(--bg-deep);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;min-height:0;
    align-self:start;
  }
  /* Direct children stay at intrinsic height; only .nav grows + scrolls. */
  .sidebar > *,.sidebar-admin > *,.tenant-sidebar > *{flex-shrink:0}
  .sidebar > .nav,.sidebar-admin > .nav,.tenant-sidebar > .nav{flex:1 1 0;min-height:0;overflow-y:auto}
  .brand{
    display:flex;align-items:center;gap:10px;
    padding:14px 16px 12px;
    border-bottom:1px solid var(--border);
  }
  .brand-mark{
    width:32px;height:32px;border-radius:11px;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);
    display:grid;place-items:center;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.12),0 0 0 1px rgba(232,161,124,0.18);
    flex-shrink:0;
  }
  .brand-name{font-family:var(--font-display);font-size:19px;font-weight:500;letter-spacing:-0.3px;line-height:1}
  .brand-meta{font-family:var(--font-mono);font-size:10px;letter-spacing:1.1px;color:var(--muted);text-transform:uppercase;margin-top:3px}
  .brand-ver{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--muted-2);letter-spacing:0.8px;align-self:flex-start;margin-top:4px}

  .plane-pill{
    margin:12px 14px 4px;
    display:flex;align-items:center;gap:10px;
    padding:9px 12px;
    border:1px solid var(--border-mid);
    border-radius:var(--r-lg);
    background:var(--surface);
    transition:border-color .15s;
    text-align:left;
    width:calc(100% - 28px);
  }
  .plane-pill.clickable{cursor:pointer}
  .plane-pill.clickable:hover{border-color:var(--border-strong)}
  .plane-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .plane-pill .body{flex:1;min-width:0}
  .plane-pill .label{font-family:var(--font-mono);font-size:9.5px;letter-spacing:1.4px;color:var(--muted);text-transform:uppercase}
  .plane-pill .name{font-size:13px;font-weight:500;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .plane-pill .id{font-family:var(--font-mono);font-size:10px;color:var(--muted-2);letter-spacing:0.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .plane-pill .chev{color:var(--muted-2);flex-shrink:0;display:grid;place-items:center}
  .plane-pill .chev svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.7}

  .back-strip{
    padding:10px 16px;
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:7px;
    color:var(--muted);font-size:12px;cursor:pointer;
    transition:color .12s,background .12s;
  }
  .back-strip:hover{color:var(--fg-2);background:var(--surface)}
  .back-strip svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}

  .nav{padding:6px 10px;flex:1;overflow-y:auto}
  .nav-section{margin:14px 0 4px;padding:0 8px;display:flex;align-items:center;gap:6px;justify-content:space-between}
  .nav-section .mono{font-size:9.5px;letter-spacing:1.5px}

  .nav-item{
    display:flex;align-items:center;gap:11px;
    padding:7px 10px;border-radius:10px;
    color:var(--fg-2);font-size:13px;font-weight:400;
    cursor:pointer;
    transition:background .12s,color .12s;
    user-select:none;
    position:relative;
  }
  .nav-item:hover{background:var(--surface);color:var(--fg)}
  .nav-item.active,.nav-item.on{background:var(--surface-2);color:var(--fg);box-shadow:inset 0 0 0 1px var(--border-mid)}
  .nav-item.active .nav-icon,.nav-item.on .nav-icon{color:var(--accent)}
  .nav-icon{width:16px;height:16px;flex-shrink:0;color:var(--muted);display:grid;place-items:center}
  .nav-icon svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.7}
  .nav-item:hover .nav-icon{color:var(--fg-2)}
  .nav-badge{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--muted);background:var(--surface-2);padding:1px 6px;border-radius:9999px;border:1px solid var(--border-mid)}
  .nav-badge.alert{background:var(--danger-soft);color:var(--danger);border-color:var(--danger-border)}
  .nav-collection{
    display:flex;align-items:center;gap:10px;
    padding:5px 10px 5px 14px;border-radius:8px;
    color:var(--fg-2);font-family:var(--font-mono);font-size:12px;letter-spacing:0.2px;
    cursor:pointer;
  }
  .nav-collection:hover{background:var(--surface);color:var(--fg)}
  .nav-collection.active,.nav-collection.on{background:var(--surface-2);color:var(--fg)}
  .nav-collection .dot{width:4px;height:4px;border-radius:50%;background:var(--muted-2);flex-shrink:0}
  .nav-collection .count{margin-left:auto;color:var(--muted-2);font-size:10.5px}

  .sidebar-foot{
    padding:11px 14px;
    border-top:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
    font-size:11.5px;color:var(--muted);
  }
  .sidebar-foot .who{flex:1;min-width:0}
  .sidebar-foot .who-name{color:var(--fg-2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sidebar-foot .who-mail{font-size:10.5px;color:var(--muted-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sidebar-foot .who-av{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,#6b4a36,var(--accent));display:grid;place-items:center;color:#fff;font-size:10px;font-weight:600;font-family:var(--font-mono);flex-shrink:0}
  .sidebar-foot .who-av-img{width:24px;height:24px;border-radius:8px;object-fit:cover;flex-shrink:0;}
  .status-pulse{width:7px;height:7px;border-radius:50%;background:var(--mint);position:relative;flex-shrink:0}
  .status-pulse::after{content:"";position:absolute;inset:-3px;border-radius:50%;background:var(--mint);opacity:.35;animation:pulse 2s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(2.2);opacity:0}}

  /* ---------------- main ---------------- */
  /* no overflow; body scrolls. min-width:0 so grid can shrink below content. */
  .main{display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  /* .topbar / .topbar-right / .crumbs / .role-badge / .top-search / .top-mascot
     / .top-icon were removed 2026-05-22 — the entire <header class="topbar">
     was retired from every admin template. See memory/feedback-no-topbar. */

  /* ---------------- view container ---------------- */
  /* .page fills the viewport width. Pages that need a narrower reading
     measure (forms-heavy single-column) opt in via .page-narrow.
     .page-wide is retained as a no-op alias for callers that explicitly
     declared "this is a wide page" — it no longer changes width. */
  .view,.page{padding:28px 32px 80px}
  .page-narrow{max-width:1080px}
  .view-head{margin-bottom:24px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .view-head > .grow{flex:1;min-width:0}
  .eyebrow{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase}
  .view-title{font-family:var(--font-display);font-size:34px;font-weight:500;letter-spacing:-0.6px;line-height:1.08;margin:6px 0 0}
  .view-sub{color:var(--fg-2);font-size:14px;margin-top:6px}
  .view-sub code{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);background:var(--bg-deep);padding:1px 6px;border-radius:6px;border:1px solid var(--border)}

  .row{display:flex;align-items:center;gap:10px}
  .grow{flex:1;min-width:0}
  .right{margin-left:auto}

  /* ---------------- buttons ---------------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    height:34px;padding:0 14px;border-radius:10px;
    font-size:13px;font-weight:500;
    border:1px solid var(--border-mid);
    background:var(--surface);color:var(--fg);
    cursor:pointer;transition:background .12s,border-color .12s,transform .05s;
    white-space:nowrap;
  }
  .btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
  .btn:active{transform:translateY(1px)}
  .btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.7}
  .btn.primary,.btn-primary{background:var(--accent);color:#3a1e10;border-color:transparent;font-weight:600}
  .btn.primary:hover,.btn-primary:hover{background:var(--accent-2)}
  .btn.ghost,.btn-ghost{background:transparent;border-color:transparent;color:var(--fg-2)}
  .btn.ghost:hover,.btn-ghost:hover{background:var(--surface);color:var(--fg)}
  .btn.danger,.btn-danger{color:var(--danger);border-color:var(--danger-border);background:transparent}
  .btn.danger:hover,.btn-danger:hover{background:var(--danger-soft)}
  .btn.sm,.btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:8px}
  .btn.sm svg,.btn-sm svg{width:12px;height:12px}
  .btn.icon{width:32px;padding:0}
  .icon-only{width:28px;height:28px;display:inline-grid;place-items:center;border-radius:7px;color:var(--muted);cursor:pointer}
  .icon-only:hover{background:var(--surface);color:var(--fg)}

  /* ---------------- pills (mockup) + chip (legacy alias) ---------------- */
  .pill,.chip{
    display:inline-flex;align-items:center;gap:5px;
    font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.6px;
    padding:2px 8px;border-radius:9999px;
    border:1px solid var(--border-mid);
    background:var(--surface);color:var(--fg-2);
    white-space:nowrap;
  }
  .pill.mint,.chip.mint{color:var(--mint);background:var(--mint-soft);border-color:var(--mint-border)}
  .pill.warn,.chip.warn{color:var(--warn);background:var(--warn-soft);border-color:var(--warn-border)}
  .pill.danger,.chip.danger{color:var(--danger);background:var(--danger-soft);border-color:var(--danger-border)}
  .pill.info,.chip.info{color:var(--info);background:var(--info-soft);border-color:var(--info-border)}
  .pill.accent,.chip.accent{color:var(--accent);background:var(--accent-soft);border-color:var(--accent-border)}
  .pill.lilac,.chip.lilac{color:var(--lilac);background:var(--lilac-soft);border-color:var(--lilac-border)}
  .pill.muted,.pill.mute,.chip.mute,.chip.muted{color:var(--muted)}
  .pill .dot,.chip .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.9}

  /* ---------------- card ---------------- */
  .card{
    background:var(--surface);
    border:1px solid var(--border-mid);
    border-radius:var(--r-lg);
  }
  .desc-tile{border:1px solid var(--border-mid);border-radius:var(--r-lg);padding:14px 16px;margin:18px 0;background:var(--surface);}
  .desc-tile-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;}
  .desc-tile-body{line-height:1.5;font-size:14px;}
  .desc-tile-body em.muted{opacity:0.6;}
  .card-head{padding:14px 18px;border-bottom:1px solid var(--border-mid);display:flex;align-items:center;gap:10px}
  .card-title{font-family:var(--font-display);font-size:18px;font-weight:500;letter-spacing:-0.2px}
  .card-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .card-body{padding:18px}
  .card-body-tight{padding:12px 16px}
  .card-foot{padding:10px 18px;border-top:1px solid var(--border-mid);display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}
  .card-head-actions{margin-left:auto;display:inline-flex;gap:10px;align-items:center;font-family:var(--font-mono);font-size:12px;color:var(--muted)}
  .count{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:0.3px}

  /* v1.23 — settings page Preferences card: iconified rows + batched Save/Cancel.
     Each row is a 3-column grid (label | control | dirty status); the action bar
     sits in its own footer-style band at the bottom of the same card. */
  .settings-rows{display:flex;flex-direction:column}
  .settings-row{
    display:grid;
    grid-template-columns:minmax(140px,auto) 1fr auto;
    gap:14px;
    align-items:center;
    padding:14px 18px;
    border-top:1px solid var(--border);
  }
  .settings-row:first-child{border-top:0}
  .settings-row-label{
    display:inline-flex;align-items:center;gap:10px;
    font-weight:500;color:var(--fg);font-size:13.5px;
  }
  .settings-row-label svg{width:16px;height:16px;color:var(--muted);flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.8}
  .settings-row .input{max-width:320px;width:100%}
  .settings-row-status{
    font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.4px;
    color:var(--accent);text-transform:uppercase;
    visibility:hidden;
  }
  .settings-row-status.is-dirty{visibility:visible}
  .settings-actions{
    display:flex;justify-content:flex-end;gap:10px;
    padding:12px 18px;
    border-top:1px solid var(--border-mid);
    background:var(--bg-deep);
  }
  .settings-actions .btn:disabled{opacity:0.5;cursor:not-allowed;pointer-events:none}

  /* ---------------- stat ---------------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .stat,.stat-tile{
    background:var(--surface);border:1px solid var(--border-mid);
    border-radius:var(--r-lg);padding:16px 18px;
    display:flex;flex-direction:column;gap:7px;
    position:relative;overflow:hidden;
  }
  .stat .label{font-family:var(--font-mono);font-size:10px;letter-spacing:1.4px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:7px}
  .stat .val,.stat-num{font-family:var(--font-display);font-size:32px;font-weight:500;letter-spacing:-0.6px;line-height:1;font-variant-numeric:tabular-nums;color:var(--fg)}
  .stat .val .unit,.stat-suffix{font-size:14px;color:var(--muted);font-family:var(--font-sans);font-weight:400;margin-left:4px;letter-spacing:0}
  .stat .meta{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .stat .meta .up{color:var(--mint)}
  .stat .meta .down{color:var(--danger)}
  .stat.accent-edge{border-color:var(--accent-border)}
  .stat.accent-edge::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 80%)}
  .audit-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:20px}

  /* ---------------- table (mockup .data-table + drust .data alias) ---------------- */
  table.data-table,table.data{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;font-variant-numeric:tabular-nums}
  /* sticky thead pinned to its scroll container's top. Most .data tables live
     inside a .card (overflow:hidden) or .records-scroll (overflow:auto), both
     of which become the sticky ancestor — so top:0 is correct. (Historical
     note: top:50px was here to clear the legacy .topbar; topbar removed
     2026-05-22, so top:0 is unconditionally right.) */
  table.data-table thead th,table.data thead th{
    text-align:left;font-family:var(--font-mono);font-size:10px;letter-spacing:1.3px;text-transform:uppercase;
    color:var(--muted);font-weight:500;
    padding:10px 14px;border-bottom:1px solid var(--border-mid);background:var(--surface);
    position:sticky;top:0;z-index:2;
  }
  table.data-table thead th.num,table.data thead th.num{text-align:right}
  table.data-table tbody td,table.data tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  table.data-table tbody tr:hover,table.data tbody tr:hover{background:var(--surface)}
  table.data-table tbody tr.clickable,table.data tbody tr.clickable{cursor:pointer}
  table.data-table tbody tr:last-child td,table.data tbody tr:last-child td{border-bottom:0}
  table.data-table .num,table.data .num{text-align:right;font-variant-numeric:tabular-nums}
  table.data-table .mono-cell,table.data .mono-cell{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);letter-spacing:0.3px}
  /* Actions cell in data tables: keep buttons + inline <form>s on one row,
     right-aligned. flex is too eager (eats the inline form's `style="display:inline"`)
     and text-align doesn't survive into flex items — so use inline-flex + nowrap. */
  table.data-table td.actions,table.data td.actions{
    text-align:right;white-space:nowrap;
  }
  table.data-table td.actions > *,table.data td.actions > *{
    display:inline-flex;vertical-align:middle;margin:0;
  }
  table.data-table td.actions > * + *,table.data td.actions > * + *{margin-left:6px}

  .ten-cell{display:flex;align-items:center;gap:11px;min-width:0}
  .ten-avatar{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;color:#fff;font-family:var(--font-mono);font-size:12px;font-weight:600;flex-shrink:0;letter-spacing:-0.3px}
  .ten-meta{min-width:0;display:flex;flex-direction:column;gap:1px}
  .ten-name{font-size:13px;color:var(--fg);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
  .ten-id{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);letter-spacing:0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}

  /* avatar tones */
  .av-1{background:linear-gradient(135deg,#a06c4a,#e8a17c)}
  .av-2{background:linear-gradient(135deg,#5e7a8a,#a5b8f0)}
  .av-3{background:linear-gradient(135deg,#7d6a8e,#c9a8e3)}
  .av-4{background:linear-gradient(135deg,#5e7e6a,#9ed3b8)}
  .av-5{background:linear-gradient(135deg,#9a7a3a,#f1c27a)}
  .av-6{background:linear-gradient(135deg,#955d5d,#e88a8a)}

  /* ---------------- key row (api keys page) ---------------- */
  .key-row{
    display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:14px;
    padding:13px 16px;
    border:1px solid var(--border-mid);
    border-radius:var(--r-md);
    background:var(--surface);
  }
  .key-row + .key-row{margin-top:10px}
  .key-row .key-icon{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--border-mid);color:var(--accent)}
  .key-row .key-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8}
  .key-row .key-info{min-width:0}
  .key-row .key-name{font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:8px}
  .key-row .key-desc{font-size:11.5px;color:var(--muted);margin-top:3px}
  .key-row .key-val{font-family:var(--font-mono);font-size:11.5px;color:var(--fg-2);background:var(--bg-deep);border:1px solid var(--border);padding:5px 10px;border-radius:8px;letter-spacing:0.3px;max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .key-row .key-val.muted{color:var(--muted)}

  /* ---------------- empty / banner / toast ---------------- */
  .empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:48px 24px;gap:14px;text-align:center;
  }
  .empty h3{font-family:var(--font-display);font-size:20px;font-weight:500;letter-spacing:-0.3px;margin:0}
  .empty p{color:var(--muted);font-size:13px;max-width:48ch;margin:0}

  .banner,.alert{
    display:flex;align-items:flex-start;gap:12px;
    padding:12px 14px;border-radius:var(--r-md);
    border:1px solid;
    font-size:13px;line-height:1.5;
  }
  .banner.info,.alert.info{color:var(--info);background:var(--info-soft);border-color:var(--info-border)}
  .banner.warn,.alert.warn{color:var(--warn);background:var(--warn-soft);border-color:var(--warn-border)}
  .banner.danger,.alert.danger,.alert.error{color:var(--danger);background:var(--danger-soft);border-color:var(--danger-border)}
  .banner.success,.alert.success{color:var(--mint);background:var(--mint-soft);border-color:var(--mint-border)}
  .banner .b-icon,.alert .b-icon{flex-shrink:0;margin-top:1px}
  .banner .b-icon svg,.alert .b-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}
  .banner .b-body,.alert .b-body{flex:1;min-width:0;color:var(--fg)}
  .banner .b-title,.alert .b-title{font-weight:500;font-family:var(--font-display);font-size:14.5px;letter-spacing:-0.1px;color:inherit}
  .banner .b-body p,.alert .b-body p{margin:2px 0 0;color:var(--fg-2)}
  .banner .b-body code,.alert .b-body code{font-family:var(--font-mono);font-size:11.5px;color:var(--fg);background:var(--bg-deep);padding:1px 5px;border-radius:5px;border:1px solid var(--border)}
  .banner .b-actions,.alert .b-actions{display:flex;gap:6px;margin-top:8px}

  .toast-stack{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column-reverse;gap:8px;z-index:50;pointer-events:none}
  .toast{
    pointer-events:auto;
    display:flex;align-items:center;gap:11px;
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    box-shadow:0 12px 40px -12px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.04) inset;
    border-radius:var(--r-md);padding:11px 14px;
    min-width:280px;max-width:420px;font-size:13px;
    animation:toast-in .18s ease-out;
  }
  @keyframes toast-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---------------- login ---------------- */
  body.login-page{background:var(--bg-deep);height:100vh;overflow:hidden}
  .login-shell{
    min-height:100vh;display:grid;place-items:center;
    background:radial-gradient(120% 80% at 50% 0%,#23191491 0%,transparent 60%),var(--bg-deep);
    padding:20px;
  }
  .login-card{
    width:min(420px,100%);
    background:var(--surface);
    border:1px solid var(--border-mid);
    border-radius:var(--r-xl);
    padding:32px 32px 24px;
    box-shadow:0 30px 100px -40px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.04) inset;
  }
  .login-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .login-brand .brand-mark{width:38px;height:38px;border-radius:12px}
  .login-brand .brand-name{font-size:22px}
  .login-brand .brand-meta{font-size:10.5px}
  .login-title{font-family:var(--font-display);font-size:28px;letter-spacing:-0.6px;font-weight:500;line-height:1.1;margin:0}
  .login-sub{color:var(--muted);font-size:13px;margin-top:6px;margin-bottom:22px}
  .login-field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .login-field label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase}
  .login-input{
    height:38px;padding:0 12px;border-radius:10px;
    background:var(--bg-deep);border:1px solid var(--border-mid);
    color:var(--fg);font:inherit;font-size:13.5px;outline:0;
    transition:border-color .12s,box-shadow .12s;
  }
  .login-input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
  .login-cta{
    width:100%;height:40px;border-radius:10px;
    background:var(--accent);color:#3a1e10;
    font-weight:600;letter-spacing:0.1px;
    border:0;cursor:pointer;margin-top:6px;
  }
  .login-cta:hover{background:var(--accent-2)}
  .login-divider{display:flex;align-items:center;gap:10px;margin:18px 0 14px;color:var(--muted-2);font-family:var(--font-mono);font-size:10px;letter-spacing:1.3px;text-transform:uppercase}
  .login-divider::before,.login-divider::after{content:"";flex:1;height:1px;background:var(--border-mid)}
  .oauth-btn{
    display:flex;align-items:center;justify-content:center;gap:9px;
    width:100%;height:40px;border-radius:10px;
    border:1px solid var(--border-mid);background:var(--bg-deep);
    color:var(--fg);font-size:13.5px;font-weight:500;cursor:pointer;
    transition:border-color .12s,background .12s;
  }
  .oauth-btn + .oauth-btn{margin-top:8px}
  .oauth-btn:hover{border-color:var(--border-strong);background:var(--surface)}
  .oauth-btn svg{width:16px;height:16px}
  .login-foot{margin-top:22px;padding-top:16px;border-top:1px solid var(--border);text-align:center;color:var(--muted-2);font-size:11.5px;display:flex;align-items:center;justify-content:center;gap:8px}

  /* ---------------- toolbar / segmented control ---------------- */
  .toolbar,.toolbar-v2{
    display:flex;align-items:center;gap:10px;margin-bottom:14px;
    padding:10px 12px;
    background:var(--surface);border:1px solid var(--border-mid);
    border-radius:var(--r-md);
    flex-wrap:wrap;
  }
  .seg{display:inline-flex;border:1px solid var(--border-mid);border-radius:9px;overflow:hidden;align-self:center}
  .seg > button,
  .seg > a{padding:6px 11px;font-size:12px;line-height:1.2;color:var(--muted);background:transparent;border:0;border-right:1px solid var(--border-mid);cursor:pointer;font-family:var(--font-mono);letter-spacing:0.3px;text-decoration:none;display:inline-flex;align-items:center}
  .seg > button:last-child,
  .seg > a:last-child{border-right:0}
  .seg > button.active,
  .seg > a.active{background:var(--surface-2);color:var(--accent)}
  .seg > button:hover:not(.active),
  .seg > a:hover:not(.active){color:var(--fg-2);background:var(--surface-2)}

  /* ---------------- forms ---------------- */
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:0}
  .field label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .field label code{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-2);background:var(--bg-deep);padding:1px 5px;border-radius:5px;border:1px solid var(--border);text-transform:none;letter-spacing:0}
  .field label .hint,.field .hint{font-family:var(--font-sans);font-size:11px;color:var(--muted-2);text-transform:none;letter-spacing:0;font-weight:400;margin-left:8px}
  .input{
    height:34px;background:var(--bg-deep);border:1px solid var(--border-mid);color:var(--fg);
    font:inherit;font-size:13px;border-radius:10px;padding:0 11px;outline:0;
    transition:border-color .12s,box-shadow .12s;min-width:200px;
  }
  .input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
  .textarea{
    background:var(--bg-deep);border:1px solid var(--border-mid);color:var(--fg);
    font:inherit;font-family:var(--font-mono);font-size:12.5px;border-radius:10px;padding:10px 12px;outline:0;
    transition:border-color .12s,box-shadow .12s;width:100%;resize:vertical;line-height:1.55;
  }
  .textarea:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
  .select{
    height:34px;padding:0 10px;background:var(--bg-deep);border:1px solid var(--border-mid);
    color:var(--fg);font:inherit;font-size:13px;border-radius:10px;outline:0;
  }
  .select:focus{border-color:var(--accent-border)}
  .check{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:var(--fg-2)}
  /* v1.28.10 — global checkbox skin. Replaces the single `accent-color`
     rule that left the unchecked state to the browser default (white).
     Unchecked: bg-deep + 1px border-strong (clearly visible in both
     themes — v1.28.9 originally referenced --bg-soft / --line which
     have no theme definition since v1.23, so the border fell back to
     `currentColor` and was effectively invisible). Checked: accent
     fill + CSS-only white check mark via ::after (rotated rectangle).
     Applies to every <input type=checkbox> across admin. */
  input[type="checkbox"]{
    appearance:none; -webkit-appearance:none;
    width:16px; height:16px;
    background:var(--bg-deep); border:1px solid var(--border-strong); border-radius:4px;
    cursor:pointer; flex-shrink:0;
    position:relative;
    transition:background 120ms, border-color 120ms;
  }
  input[type="checkbox"]:hover{border-color:var(--accent-border);}
  input[type="checkbox"]:checked{background:var(--accent); border-color:var(--accent);}
  input[type="checkbox"]:checked::after{
    content:""; display:block; position:absolute;
    left:4px; top:1px;
    width:5px; height:9px;
    border:solid #fff;
    border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  input[type="checkbox"]:focus-visible{outline:2px solid var(--accent-border); outline-offset:2px;}
  input[type="checkbox"]:disabled{opacity:0.5; cursor:not-allowed;}
  .form-inline{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}

  /* ---------------- code / sql / explain ---------------- */
  pre.code,.sql-block{
    font-family:var(--font-mono);font-size:12px;line-height:1.65;
    background:var(--bg-deep);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;color:var(--fg-2);
    white-space:pre;overflow-x:auto;margin:0;
  }
  .code-sm{font-size:11.5px;line-height:1.55}
  .sql-block .k{color:var(--accent)}
  .sql-block .s{color:var(--mint)}
  .sql-block .n{color:var(--warn)}
  .sql-block .c{color:var(--muted-2);font-style:italic}

  /* ---------------- timeline (audit) ---------------- */
  .tl{display:flex;flex-direction:column;gap:0}
  .tl-row{display:grid;grid-template-columns:104px 22px 1fr auto;align-items:baseline;gap:12px;padding:10px 0;position:relative}
  .tl-row + .tl-row{border-top:1px dashed var(--border)}
  .tl-row .tl-time{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:left;letter-spacing:0.2px;white-space:nowrap}
  .tl-row .tl-glyph{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;background:var(--bg-deep);border:1px solid var(--border-mid);color:var(--muted);font-family:var(--font-mono);font-size:10px}
  .tl-row .tl-glyph.ok{color:var(--mint);border-color:var(--mint-border);background:var(--mint-soft)}
  .tl-row .tl-glyph.warn{color:var(--warn);border-color:var(--warn-border);background:var(--warn-soft)}
  .tl-row .tl-glyph.fail{color:var(--danger);border-color:var(--danger-border);background:var(--danger-soft)}
  .tl-row .tl-body{font-size:13px;color:var(--fg-2);min-width:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;line-height:1.6}
  .tl-row .tl-meta{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);text-align:right}

  /* method/path/actor chips inside .tl-body. The method is the most
     scan-able anchor; tinted per verb so eyes catch reads vs writes at a
     glance. Path is the natural-language part. Actor is muted (it's
     metadata, not the story). */
  .op-method{
    display:inline-flex;align-items:center;
    font-family:var(--font-mono);font-size:10px;font-weight:600;
    letter-spacing:1.2px;padding:2px 7px;border-radius:6px;
    border:1px solid var(--border-mid);background:var(--bg-deep);color:var(--muted);
  }
  .op-method.op-get   {color:var(--info);  border-color:var(--info-border);  background:var(--info-soft)}
  .op-method.op-post  {color:var(--mint);  border-color:var(--mint-border);  background:var(--mint-soft)}
  .op-method.op-patch,
  .op-method.op-put   {color:var(--warn);  border-color:var(--warn-border);  background:var(--warn-soft)}
  .op-method.op-delete{color:var(--danger);border-color:var(--danger-border);background:var(--danger-soft)}
  .op-path{
    font-family:var(--font-mono);font-size:12px;color:var(--fg);
    min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .op-actor{
    font-family:var(--font-mono);font-size:10px;letter-spacing:1.1px;text-transform:uppercase;
    color:var(--muted-2);padding:1px 6px;border-radius:5px;border:1px solid var(--border);
  }
  .op-err{
    font-family:var(--font-mono);font-size:10px;letter-spacing:0.8px;
    color:var(--danger);background:var(--danger-soft);border:1px solid var(--danger-border);
    padding:1px 6px;border-radius:5px;
  }

  /* ---------------- backup / webhook / file rows (mockup) ---------------- */
  .bk-row{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--border-mid);border-radius:var(--r-md);background:var(--surface)}
  .bk-row + .bk-row{margin-top:8px}
  .bk-row .bk-glyph{width:32px;height:32px;border-radius:9px;background:var(--bg-deep);border:1px solid var(--border-mid);display:grid;place-items:center;color:var(--accent)}
  .bk-row .bk-name{font-family:var(--font-mono);font-size:12.5px;color:var(--fg);letter-spacing:0.2px}
  .bk-row .bk-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .bk-row .bk-size{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);text-align:right}
  .bk-row .bk-actions{display:flex;gap:6px}

  /* ---------------- tenants list extras ---------------- */
  .ten-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:24px}
  .ten-pulse{
    background:var(--surface);border:1px solid var(--border-mid);
    border-radius:var(--r-lg);padding:14px 16px;
  }
  .ten-pulse .head{display:flex;align-items:center;gap:10px}
  .ten-pulse .body{font-family:var(--font-display);font-size:24px;font-weight:500;line-height:1;margin-top:8px;font-variant-numeric:tabular-nums;letter-spacing:-0.4px}
  .ten-pulse .body .unit{font-size:13px;color:var(--muted);font-family:var(--font-sans);font-weight:400;margin-left:4px;letter-spacing:0}
  .ten-pulse .meta{font-size:11.5px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:7px}

  /* ---------------- col-tabs (collection editor) + legacy .tabs ---------------- */
  .col-tabs,.tabs{
    display:flex;gap:2px;margin-bottom:18px;
    padding:4px;border:1px solid var(--border-mid);background:var(--surface);
    border-radius:var(--r-md);width:fit-content;
  }
  .col-tab,.tab{
    padding:6px 14px;border-radius:8px;font-size:12.5px;color:var(--muted);
    cursor:pointer;display:flex;align-items:center;gap:7px;letter-spacing:0.2px;
    transition:background .12s,color .12s;text-decoration:none;
  }
  .col-tab:hover,.tab:hover{color:var(--fg-2)}
  .col-tab.active,.col-tab.on,
  .tab.active,.tab.on{background:var(--surface-2);color:var(--fg);box-shadow:inset 0 0 0 1px var(--border-mid)}
  .col-tab .mono,.tab .mono{font-size:10px;color:var(--muted-2)}

  /* ---------------- pager ---------------- */
  .pager{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px 0 0;font-family:var(--font-mono);font-size:12px;color:var(--muted)}
  .pager-group{display:inline-flex;gap:8px;align-items:center}
  .pager a,.pager span{padding:5px 11px;border-radius:8px;border:1px solid var(--border-mid);background:var(--surface);color:var(--fg-2)}
  .pager a:hover{border-color:var(--border-strong);color:var(--fg)}
  .pager .current{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-border)}

  /* ---------------- records-scroll (collection rows wide tables) ---------------- */
  /* v1.28 — collection page no longer constrains the rows table to its own
     scroll surface. Single viewport scroll only. Rule kept (no max-height)
     so any remaining .records-scroll wrapper renders as a passive border. */
  .records-scroll{border-radius:var(--r-md);border:1px solid var(--border-mid)}

  /* ---------------- collection_rows toolbar layout ---------------- */
  /* .toolbar wraps a <form> with .field cards + .actions. Each .field is
     label-on-top, control below; align them flush at the bottom so the
     buttons in .actions sit on the same baseline as the inputs. */
  .toolbar > .field{align-self:flex-end;min-width:180px}
  .toolbar > .field:first-child{flex:1 1 240px}
  .toolbar > .actions{display:inline-flex;align-items:center;gap:6px;align-self:flex-end;margin-left:auto}

  /* WHERE prefix box: a small chip glued to the left of the input. */
  .input-prefix{display:inline-flex;align-items:stretch;border:1px solid var(--border-mid);border-radius:10px;overflow:hidden;background:var(--bg-deep);min-width:240px}
  .input-prefix:focus-within{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
  .input-prefix > .prefix{
    display:inline-flex;align-items:center;padding:0 10px;
    font-family:var(--font-mono);font-size:11px;letter-spacing:1px;
    color:var(--accent);background:var(--surface-2);
    border-right:1px solid var(--border-mid);text-transform:uppercase;
  }
  .input-prefix > .input{border:0;background:transparent;border-radius:0;min-width:0;flex:1}
  .input-prefix > .input:focus{border:0;box-shadow:none}

  /* Counts row above the records table. */
  .meta-row{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    font-family:var(--font-mono);font-size:11.5px;color:var(--muted);letter-spacing:0.2px;
    padding:10px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .meta-row b{color:var(--fg);font-weight:600}
  .meta-row .spacer,.spacer{flex:1;min-width:0}

  /* Cell truncation: applied per-<td> with class="trunc". Without max-width:0
     the cell stretches with content; together with overflow:hidden and
     text-overflow:ellipsis the row stays bounded. Hover/title shows full value. */
  table.data td.trunc,table.data-table td.trunc{
    max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  table.data td.null,table.data-table td.null{color:var(--muted-2);font-style:italic}

  /* Empty-state CTA below "0 records". */
  .suggest{margin-top:18px}

  /* ---------------- schema-row (collection schema tab) ---------------- */
  /* 8-column grid matching the head row: drag · field · type · null · default · constraints · description · trailing */
  .schema-row{
    display:grid;
    grid-template-columns:28px minmax(160px,1.4fr) minmax(120px,0.8fr) 60px minmax(80px,0.8fr) minmax(120px,1.2fr) minmax(160px,1.4fr) 28px;
    gap:14px;align-items:center;
    padding:10px 18px;border-bottom:1px solid var(--border);
    font-size:13px;
  }
  .schema-row:last-child{border-bottom:0}
  .schema-row.head{
    background:var(--surface);
    font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.3px;color:var(--muted);
    text-transform:uppercase;
  }
  .schema-row .drag{color:var(--muted-2);cursor:grab;font-family:var(--font-mono);font-size:12px;text-align:center;user-select:none}
  .schema-row .fld-name{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12.5px;color:var(--fg);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .schema-row .fld-type{font-family:var(--font-mono);font-size:12px;color:var(--accent);letter-spacing:0.3px}
  .schema-row .fld-null{font-family:var(--font-mono);font-size:13px;text-align:center}
  .schema-row .fld-null.yes{color:var(--mint)}
  .schema-row .fld-null.no{color:var(--muted-2)}
  .schema-row .fld-default{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .schema-row .fld-desc{font-size:12px;color:var(--muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ---------------- output / error block ---------------- */
  .output{
    background:var(--bg-deep);border:1px solid var(--border);border-radius:10px;
    padding:10px 12px;font-family:var(--font-mono);font-size:12px;color:var(--fg-2);
    white-space:pre-wrap;word-break:break-word;margin-top:10px;
  }
  .output.error,.output.is-error{color:var(--danger);background:var(--danger-soft);border-color:var(--danger-border)}

  /* ---------------- muted helpers ---------------- */
  .muted{color:var(--muted)}
  .muted-cell{color:var(--muted);font-size:12.5px}
  .mono-cell{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);letter-spacing:0.3px}

  /* ---------------- oauth provider card / hk row / cap tile / schema row ---------------- */
  .prov-card{
    background:var(--surface);border:1px solid var(--border-mid);
    border-radius:var(--r-lg);padding:18px;
    display:grid;grid-template-columns:48px 1fr auto;gap:14px;align-items:start;
  }
  .prov-card + .prov-card{margin-top:10px}
  .prov-card.on{border-color:var(--mint-border)}
  .prov-card.off{border-color:var(--border)}
  .prov-icon{
    width:48px;height:48px;border-radius:12px;
    background:var(--bg-deep);border:1px solid var(--border-mid);
    display:grid;place-items:center;
  }
  .prov-icon svg{width:24px;height:24px}
  .prov-body{min-width:0;display:flex;flex-direction:column;gap:10px}
  .prov-title{font-family:var(--font-display);font-size:17px;font-weight:500;letter-spacing:-0.2px;display:flex;align-items:center;gap:9px}
  .prov-meta{font-size:12.5px;color:var(--muted)}
  .prov-fields{display:grid;grid-template-columns:120px 1fr;gap:6px 14px;font-size:12px;margin-top:6px}
  .prov-fields .lbl{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase;align-self:center}
  .prov-fields .val{font-family:var(--font-mono);font-size:11.5px;color:var(--fg-2);background:var(--bg-deep);border:1px solid var(--border);padding:5px 10px;border-radius:8px;letter-spacing:0.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .hk-row{
    background:var(--surface);border:1px solid var(--border-mid);
    border-radius:var(--r-md);padding:14px 16px;
    display:grid;grid-template-columns:36px 1fr auto auto;gap:14px;align-items:center;
  }
  .hk-row + .hk-row{margin-top:10px}
  .hk-row .hk-glyph{width:36px;height:36px;border-radius:10px;background:var(--bg-deep);border:1px solid var(--border-mid);display:grid;place-items:center;color:var(--accent)}
  .hk-row .hk-name{font-family:var(--font-mono);font-size:13px;color:var(--fg);letter-spacing:0.2px;display:flex;align-items:center;gap:8px}
  .hk-row .hk-url{font-family:var(--font-mono);font-size:11.5px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:520px}
  .hk-row .hk-tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}

  /* ---------------- cap-tile (anon caps) ---------------- */
  .cap-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}
  .cap-tile{
    background:var(--surface);border:1px solid var(--border-mid);
    border-radius:var(--r-md);padding:14px;
    display:flex;align-items:center;gap:12px;cursor:pointer;
    transition:border-color .12s,background .12s;position:relative;
  }
  .cap-tile:hover{border-color:var(--border-strong)}
  .cap-tile.on{border-color:var(--accent-border);background:linear-gradient(145deg,var(--accent-soft) 0%,var(--surface) 60%)}
  .cap-tile .cap-glyph{
    width:36px;height:36px;border-radius:10px;
    background:var(--bg-deep);border:1px solid var(--border-mid);
    display:grid;place-items:center;color:var(--muted);flex-shrink:0;
    font-family:var(--font-mono);font-size:10px;letter-spacing:0.8px;font-weight:600;
  }
  .cap-tile.on .cap-glyph{color:var(--accent);border-color:var(--accent-border);background:var(--accent-soft)}
  .cap-tile .cap-name{font-size:13px;font-weight:500;color:var(--fg)}
  .cap-tile .cap-desc{font-size:11.5px;color:var(--muted);margin-top:2px}
  /* iOS-style toggle track + knob, sits at the right edge of every .cap-tile.
     Visible state is driven entirely by `.cap-tile.on` — no JS required for the
     visual. (Anon-caps + realtime tabs both render this.) */
  .cap-tile .cap-switch{
    margin-left:auto;flex-shrink:0;
    width:32px;height:18px;border-radius:9999px;
    background:var(--bg-deep);border:1px solid var(--border-strong);
    position:relative;transition:background .14s,border-color .14s;
  }
  .cap-tile .cap-switch::after{
    content:'';position:absolute;left:1px;top:1px;
    width:14px;height:14px;border-radius:50%;
    background:var(--muted);transform:translateX(0);
    transition:transform .14s,background .14s;
  }
  .cap-tile.on .cap-switch{background:var(--accent-soft);border-color:var(--accent-border)}
  .cap-tile.on .cap-switch::after{background:var(--accent);transform:translateX(14px)}

  /* ---------------- modal (drustUI alert/confirm/prompt) ---------------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(15,11,9,0.66);
    display:flex;align-items:flex-start;justify-content:center;
    padding-top:14vh;z-index:60;backdrop-filter:blur(4px);
  }
  .modal-overlay[hidden]{display:none}
  .modal{
    width:min(460px,92vw);background:var(--surface);
    border:1px solid var(--border-strong);border-radius:var(--r-xl);
    box-shadow:0 30px 100px -30px rgba(0,0,0,0.6);
    padding:22px 24px 18px;animation:toast-in .14s ease-out;
  }
  .modal-title{font-family:var(--font-display);font-size:20px;font-weight:500;letter-spacing:-0.3px;margin:0 0 10px}
  .modal-body{color:var(--fg-2);font-size:13.5px;margin-bottom:14px;line-height:1.55}
  .modal-input{
    width:100%;height:36px;padding:0 12px;border-radius:10px;
    background:var(--bg-deep);border:1px solid var(--border-mid);
    color:var(--fg);font:inherit;font-size:13.5px;outline:0;
    margin-bottom:14px;transition:border-color .12s,box-shadow .12s;
  }
  .modal-input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-soft)}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px}
  .modal-variant-danger .modal-title{color:var(--danger)}
  .modal-code-wrap{position:relative;background:var(--bg-deep);border:1px solid var(--border);border-radius:8px;padding:10px 36px 10px 12px;margin-top:8px;overflow-x:auto}
  .modal-code-wrap code{font-family:var(--font-mono);font-size:11.5px;color:var(--fg-2);white-space:pre-wrap;word-break:break-all}
  .modal-code-copy{position:absolute;top:6px;right:6px;width:24px;height:24px;display:grid;place-items:center;color:var(--muted);background:transparent;border:0;cursor:pointer;border-radius:6px}
  .modal-code-copy:hover{background:var(--surface-2);color:var(--fg)}
  .modal-code-copy.is-ok{color:var(--mint)}
  .modal-code-copy svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.7}

  /* ---------------- cmd-K palette (drust _cmdk.html) ---------------- */
  .cmdk-overlay{
    position:fixed;inset:0;background:rgba(15,11,9,0.66);
    display:flex;align-items:flex-start;justify-content:center;
    padding-top:14vh;z-index:55;backdrop-filter:blur(4px);
  }
  .cmdk-overlay[hidden]{display:none}
  .cmdk{
    width:min(560px,92vw);background:var(--surface);
    border:1px solid var(--border-strong);border-radius:var(--r-xl);
    box-shadow:0 30px 100px -30px rgba(0,0,0,0.6);
    overflow:hidden;animation:toast-in .14s ease-out;
  }
  .cmdk-input{
    width:100%;background:transparent;border:0;outline:0;
    color:var(--fg);font:inherit;font-size:14px;
    padding:14px 16px;border-bottom:1px solid var(--border-mid);
  }
  .cmdk-list{max-height:50vh;overflow-y:auto;padding:6px}
  .cmdk-item{
    display:flex;align-items:center;gap:11px;
    padding:8px 10px;border-radius:9px;cursor:pointer;
    text-decoration:none;color:inherit;
  }
  .cmdk-item:hover,.cmdk-item.on{background:var(--surface-2)}
  .cmdk-item .cmdk-label{flex:1;min-width:0}
  .cmdk-item .cmdk-hint{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);letter-spacing:0.3px}

  /* ---------------- docs page (changelog viewer) ---------------- */
  .docs-shell{display:grid;grid-template-columns:220px minmax(0,1fr);gap:24px;padding:28px 32px 80px;max-width:1380px}
  .docs-toc{position:sticky;top:78px;align-self:flex-start;max-height:calc(100vh - 100px);overflow-y:auto}
  .docs-toc-head{font-family:var(--font-mono);font-size:10px;letter-spacing:1.4px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .docs-toc-list{display:flex;flex-direction:column;gap:3px}
  .docs-toc-list a{font-size:12.5px;color:var(--muted);padding:5px 10px;border-radius:7px;border-left:2px solid transparent}
  .docs-toc-list a:hover{color:var(--fg-2);background:var(--surface)}
  .docs-toc-list a.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-soft)}
  .docs-content{min-width:0}
  .markdown-body{color:var(--fg-2);font-size:14px;line-height:1.7}
  .markdown-body h1,.markdown-body h2,.markdown-body h3{font-family:var(--font-display);font-weight:500;color:var(--fg);letter-spacing:-0.3px;margin:1.8em 0 0.5em}
  .markdown-body h1{font-size:28px}
  .markdown-body h2{font-size:22px;border-bottom:1px solid var(--border-mid);padding-bottom:6px}
  .markdown-body h3{font-size:17px}
  .markdown-body code{font-family:var(--font-mono);font-size:12.5px;color:var(--fg);background:var(--bg-deep);padding:1px 6px;border-radius:5px;border:1px solid var(--border)}
  .markdown-body pre{background:var(--bg-deep);border:1px solid var(--border);border-radius:10px;padding:12px 14px;overflow-x:auto}
  .markdown-body pre code{background:transparent;border:0;padding:0;font-size:12px}
  .markdown-body a{color:var(--accent);text-decoration:underline;text-decoration-color:var(--accent-border)}
  .markdown-body a:hover{text-decoration-color:var(--accent)}
  .markdown-body ul,.markdown-body ol{padding-left:1.5em}
  .markdown-body li{margin:0.3em 0}
  .markdown-body blockquote{border-left:3px solid var(--border-mid);margin:1em 0;padding:6px 14px;color:var(--muted)}

  /* ---------------- utility ---------------- */
  .hide{display:none !important}
  .vsep{width:1px;height:18px;background:var(--border-mid);align-self:center}
  .anim-fade{animation:fade .25s ease-out}
  @keyframes fade{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:none}}

  /* icon util used by SVG <use> sprite */
  .icon{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.7}

  /* ---------------- files page (host + per-tenant + reconcile) ---------------- */
  /* drag-and-drop upload region */
  .dropzone{
    position:relative;border:1.5px dashed var(--border-mid);border-radius:var(--r-lg);
    background:var(--bg-deep);padding:24px 18px;text-align:center;
    transition:border-color .15s,background .15s;
  }
  .dropzone:hover,.dropzone.is-over{border-color:var(--accent-border);background:var(--accent-soft)}
  .dropzone-inner{display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none}
  .dropzone-prompt{display:inline-flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;pointer-events:auto}
  .dz-arrow{display:inline-grid;place-items:center;width:24px;height:24px;border:1px solid var(--border-mid);border-radius:8px;background:var(--surface);color:var(--accent);font-family:var(--font-mono);font-size:13px}
  .dz-text{font-size:13px}
  .dz-or{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted-2)}
  .filepick-btn{
    display:inline-flex;align-items:center;justify-content:center;height:28px;padding:0 12px;
    border:1px solid var(--border-mid);background:var(--surface);color:var(--fg);
    border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;
    transition:background .12s,border-color .12s;pointer-events:auto;
  }
  .filepick-btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
  .filepick-input{
    /* visually hidden but accessible */
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }
  .dropzone-name{font-family:var(--font-mono);font-size:11.5px;color:var(--fg-2);margin-top:6px;letter-spacing:0.3px;word-break:break-all}
  .dropzone-name[data-empty="1"]{color:var(--muted-2)}

  /* upload form layout below the dropzone — fields side-by-side */
  .upload-fields{display:flex;flex-direction:row;flex-wrap:wrap;gap:20px 28px;margin-top:14px}
  .upload-fields .field{flex:0 1 auto;min-width:0}
  .upload-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:14px}
  .upload-row .upload-hint{flex:1}
  .upload-hint{font-size:11.5px;color:var(--muted)}
  .field-label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px}

  /* pill-toggle: radio group rendered as a segmented control. The native
     radios are visually hidden; clicking the label toggles them. */
  .pill-toggle{
    display:inline-flex;gap:2px;padding:4px;
    border:1px solid var(--border-mid);background:var(--bg-deep);
    border-radius:var(--r-md);
  }
  .pill-toggle input[type="radio"]{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }
  .pill-toggle label{
    padding:6px 14px;border-radius:8px;font-size:12.5px;
    color:var(--muted);cursor:pointer;letter-spacing:0.2px;
    transition:background .12s,color .12s,box-shadow .12s;
    user-select:none;
  }
  .pill-toggle label:hover{color:var(--fg-2)}
  .pill-toggle input[type="radio"]:checked + label{
    background:var(--accent-soft);color:var(--accent);
    box-shadow:inset 0 0 0 1px var(--accent-border);
  }
  .pill-toggle input[type="radio"]:focus-visible + label{
    outline:2px solid var(--accent-border);outline-offset:1px;
  }

  /* files data table column widths + cell flavors */
  table.data .col-name,table.data-table .col-name{width:auto}
  table.data .col-vis,table.data-table .col-vis{width:90px}
  table.data .col-type,table.data-table .col-type{width:140px}
  table.data .col-size,table.data-table .col-size{width:90px;text-align:right}
  table.data .col-time,table.data-table .col-time{width:160px}
  table.data .col-actions,table.data-table .col-actions{width:180px;text-align:right}
  table.data .cell-name,table.data-table .cell-name{max-width:0;overflow:hidden}
  table.data .cell-name a,table.data-table .cell-name a{color:var(--fg);text-decoration:none}
  table.data .cell-name a:hover,table.data-table .cell-name a:hover{color:var(--accent);text-decoration:underline}
  table.data .cell-size,table.data-table .cell-size{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--font-mono);font-size:12px;color:var(--fg-2)}
  table.data .cell-time,table.data-table .cell-time{font-family:var(--font-mono);font-size:11.5px;color:var(--muted);letter-spacing:0.2px}
  table.data .cell-type,table.data-table .cell-type{max-width:0;overflow:hidden}
  table.data .cell-type .trunc-inner,table.data-table .cell-type .trunc-inner{font-family:var(--font-mono);font-size:11.5px;color:var(--muted)}
