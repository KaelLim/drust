<style>
  /* Design tokens — cozy-dark palette, apricot accent (hue ~50).
     Web fonts loaded from Google Fonts; if internal hosting is needed
     later, mirror these three families into a static asset path and
     replace the @import. */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  :root {
    /* accent: apricot at hue 50 */
    --accent-h: 50;
    --accent-c: 0.10;
    --accent-l: 0.78;

    /* surfaces — warm charcoal family, hue 50–60 */
    --desktop:   oklch(0.18 0.012 50);
    --bg:        oklch(0.22 0.010 50);
    --bg-2:      oklch(0.26 0.012 55);
    --bg-3:      oklch(0.30 0.013 55);
    --surface:   oklch(0.235 0.011 50);
    --line:      oklch(0.34 0.013 55);
    --line-2:    oklch(0.40 0.014 55);

    /* ink */
    --muted:     oklch(0.58 0.014 55);
    --muted-2:   oklch(0.48 0.013 55);
    --text:      oklch(0.93 0.020 65);
    --text-soft: oklch(0.82 0.022 65);
    --text-dim:  oklch(0.65 0.022 65);

    /* accent family */
    --accent:      oklch(var(--accent-l) var(--accent-c) var(--accent-h));
    --accent-2:    oklch(0.84 0.09 55);
    --accent-soft: oklch(0.32 0.06 var(--accent-h));
    --accent-line: oklch(0.50 0.08 var(--accent-h));

    /* status families */
    --warn:        oklch(0.80 0.12 85);
    --warn-soft:   oklch(0.32 0.06 85);
    --warn-line:   oklch(0.50 0.10 85);

    --danger:      oklch(0.66 0.13 30);
    --danger-soft: oklch(0.30 0.07 30);
    --danger-line: oklch(0.50 0.11 30);

    --ok:          oklch(0.78 0.10 130);
    --ok-soft:     oklch(0.30 0.06 130);
    --ok-line:     oklch(0.46 0.09 130);

    --info:        oklch(0.73 0.05 230);
    --info-soft:   oklch(0.30 0.04 230);
    --info-line:   oklch(0.45 0.06 230);

    --lilac:       oklch(0.72 0.06 305);
    --lilac-soft:  oklch(0.30 0.05 305);
    --lilac-line:  oklch(0.45 0.07 305);

    /* typography stacks. Existing components currently use --mono for
       most chrome (terminal aesthetic). Migrating to mockup philosophy
       (sans for UI, mono for data, serif for display) is a Phase 1b
       task — not done here. New components built against the mockup
       can opt into --serif / --sans directly. */
    --serif: 'Newsreader', Georgia, 'Times New Roman', serif;
    --sans:  'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;

    --row-y: 14px;
    --cell-x: 18px;
    --radius: 4px;
    --radius-lg: 6px;

    /* macOS traffic-light colors — kept at canonical hues so the
       window chrome reads as macOS even when the rest of the palette
       is warm. */
    --tl-red:    oklch(0.70 0.18 20);
    --tl-yellow: oklch(0.82 0.16 85);
    --tl-green:  oklch(0.76 0.17 145);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    height: 100%;
  }
  body {
    font-family: var(--sans);
    font-size: 13.5px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background: var(--bg);
    min-height: 100vh;
    overflow: hidden;
  }

  /* mockup-aligned full-bleed app shell. Two columns: 248px sidebar + 1fr main.
     Replaces the legacy .macwin macOS-window frame (dropped 2026-05-17). */
  .app-shell {
    display: grid;
    grid-template-columns: 248px minmax(0, 1fr);
    height: 100vh;
    overflow: hidden;
  }
  @media (max-width: 960px) {
    .app-shell { grid-template-columns: 220px minmax(0, 1fr); }
  }

  /* Legacy .macwin classes — kept as no-ops so any stale include doesn't 500
     while we sweep templates. Once every page uses .app-shell, these will
     be removed in a cleanup pass. */
  .macwin, .macwin-body { display: contents; }
  .macwin-title { display: none; }

  /* Shared sidebar shell — both .sidebar-admin (host) and .sidebar-tenant
     (per-tenant, aka .tenant-sidebar) opt into this base. */
  .sidebar, .tenant-sidebar {
    background: oklch(0.205 0.011 50);
    border-right: 1px solid var(--line-2);
    display: flex; flex-direction: column;
    min-height: 0; height: 100vh;
    overflow: hidden;
    position: sticky; top: 0;
  }

  /* topbar — v1.14: clean breadcrumb instead of legacy terminal prompt.
     Sticky 56-px strip; left column scrolls horizontally for very deep
     paths via the `.topbar-crumbs` overflow rule; right column hosts
     the version link / mascot + role-badge / logout. */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center;
    gap: 20px;
    padding: 0 24px;
    height: 56px;
    flex-shrink: 0;
    background: oklch(0.235 0.012 55);
    border-bottom: 1px solid var(--line-2);
    font-family: var(--sans);
    font-size: 14px;
  }

  /* Breadcrumb left side. Last segment carries `.here` and stays the
     brightest; earlier segments are links (or plain text if no parent
     page exists for them). Separator chosen as a small `/` glyph for
     a code-aesthetic without going full terminal. */
  .topbar-crumbs {
    display: inline-flex; align-items: center; gap: 10px;
    min-width: 0; overflow: hidden;
    font: 500 14px/1 var(--sans);
    color: var(--muted);
  }
  .topbar-crumbs a {
    color: var(--text-soft); text-decoration: none;
    transition: color .12s;
    white-space: nowrap;
  }
  .topbar-crumbs a:hover { color: var(--text); }
  .topbar-crumbs .sep { color: var(--muted-2); font-size: 13px; }
  .topbar-crumbs .here {
    color: var(--text); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }
  .topbar-crumbs .root {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    color: var(--accent);
    border-radius: 4px;
  }
  .topbar-crumbs .root:hover { background: var(--accent-soft); color: var(--accent-2); }

  .topbar-right { display: inline-flex; align-items: center; gap: 14px; color: var(--muted); font-size: 13px; }
  .topbar-right .who { color: var(--text-soft); }
  .topbar-right .who b { color: var(--text); font-weight: 500; }
  .topbar-right a.who {
    text-decoration: none; cursor: pointer;
    transition: color .12s, border-color .12s;
    border-bottom: 1px dashed transparent;
  }
  .topbar-right a.who:hover { color: var(--text); border-bottom-color: var(--muted-2); }
  .topbar-right .sep { color: var(--line); }
  .topbar-right a, .topbar-right form button {
    color: var(--muted); text-decoration: none;
    background: transparent; border: 0; cursor: pointer;
    font-family: var(--sans); font-size: 16px; padding: 0;
  }
  .topbar-right a:hover, .topbar-right form button:hover { color: var(--text); }

  /* layout */
  .main {
    min-width: 0; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: oklch(0.36 0.013 55) transparent;
  }
  .main::-webkit-scrollbar { width: 10px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: oklch(0.36 0.013 55); border-radius: 4px; }
  .main::-webkit-scrollbar-thumb:hover { background: oklch(0.50 0.015 55); }

  .page { max-width: 1400px; margin: 0 auto; padding: 36px 48px 120px; }
  .page-narrow { max-width: 1080px; }
  .page-wide   { max-width: 1400px; }

  h1, h2, h3 { font-weight: 600; letter-spacing: -0.005em; margin: 0; }
  /* h1 is the display heading — Newsreader serif at 32px. Existing
     page templates that mix a serif name with a `/path` suffix inline
     a mono span; the contrast reads as intentional. */
  h1 { font-family: var(--serif); font-weight: 500; font-size: 32px; line-height: 1.2; letter-spacing: -0.015em; color: var(--text); }
  h2 { font-family: var(--sans); font-size: 18px; line-height: 1.3; }
  h3 { font-family: var(--sans); font-size: 15px; line-height: 1.3; color: var(--text-soft); }

  .crumbs {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--sans); font-size: 14px; color: var(--muted);
    margin-bottom: 24px;
  }
  .crumbs a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted transparent; }
  .crumbs a:hover { color: var(--text); border-bottom-color: var(--muted-2); }
  .crumbs .sep { color: var(--line); }
  .crumbs .here { color: var(--text); }

  .pagehead { display: flex; align-items: flex-end; justify-content: space-between; gap: 28px; margin-bottom: 28px; }

  /* Tabs (collection_rows: Data | Schema). Server-rendered, no JS;
     each tab is an <a> linking to ?tab=… so back/forward and bookmark
     keep working. The active tab gets a green underline + filled text. */
  .tabs {
    display: inline-flex; gap: 0;
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    display: inline-block;
    padding: 8px 18px 10px;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color .12s, border-color .12s;
  }
  .tab:hover { color: var(--text-soft); }
  .tab.on { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }
  .pagehead .meta { font-family: var(--sans); font-size: 14px; color: var(--muted); margin-top: 8px; }
  .pagehead .meta b { color: var(--text-soft); font-weight: 500; }
  .pagehead .actions { display: inline-flex; gap: 10px; }
  .pagehead .meta a { color: var(--accent); text-decoration: none; }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 38px; padding: 0 16px;
    font: 500 14px/1 var(--sans);
    color: var(--text); background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color .1s, background .1s, color .1s;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--muted-2); background: var(--bg-2); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .btn-danger { color: var(--danger); border-color: var(--danger-line); background: transparent; }
  .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); color: oklch(0.95 0.05 30); }
  .btn-primary {
    background: var(--accent); color: oklch(0.14 0.02 var(--accent-h));
    border-color: var(--accent); font-weight: 600;
  }
  .btn-primary:hover { background: oklch(calc(var(--accent-l) + 0.05) var(--accent-c) var(--accent-h)); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text-soft); }
  .btn-ghost:hover { color: var(--text); background: var(--bg-2); }
  .btn-sm { height: 30px; padding: 0 12px; font-size: 13px; border-radius: 3px; }
  .btn .kbd { color: oklch(0.24 0.03 var(--accent-h)); margin-left: 8px; font-size: 16px; }

  /* inputs */
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field > label {
    font: 600 12px/1 var(--sans);
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .field > label .hint { color: var(--muted-2); font-weight: 400; margin-left: 8px; font-size: 11px; text-transform: none; letter-spacing: 0; }
  .input, .select {
    height: 48px; padding: 0 14px;
    font: 400 18px/1 var(--mono);
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition: border-color .1s, box-shadow .1s;
  }
  .input::placeholder { color: var(--muted-2); }
  .input:hover, .select:hover { border-color: var(--muted-2); }
  .input:focus, .select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
  }
  .input-prefix {
    display: inline-flex; align-items: stretch;
    border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface);
    overflow: hidden;
  }
  .input-prefix:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
  }
  .input-prefix > .prefix {
    display: inline-flex; align-items: center; padding: 0 14px;
    font: 500 14px/1 var(--sans); color: var(--muted);
    background: oklch(0.28 0.013 55); border-right: 1px solid var(--line);
  }
  .input-prefix > .input { border: 0; border-radius: 0; box-shadow: none; flex: 1; }
  .input-prefix > .input:focus { box-shadow: none; }

  /* Custom checkbox — design-tokens-aligned. Wrap an <input type="checkbox">
     and a label string in <label class="check">. */
  .check {
    display: inline-flex; align-items: center; gap: 10px;
    font: 500 13px/1 var(--sans);
    color: var(--text);
    cursor: pointer; user-select: none;
  }
  .check input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 18px; height: 18px;
    margin: 0; flex: 0 0 auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    display: inline-grid; place-content: center;
    cursor: pointer;
    transition: border-color .1s, background .1s, box-shadow .1s;
  }
  .check input[type="checkbox"]::before {
    content: "";
    width: 10px; height: 10px;
    transform: scale(0);
    transition: transform .1s ease-out;
    background: oklch(0.14 0.02 var(--accent-h));
    clip-path: polygon(14% 44%, 0 60%, 40% 100%, 100% 24%, 88% 13%, 38% 71%);
  }
  .check input[type="checkbox"]:hover { border-color: var(--accent-line); }
  .check input[type="checkbox"]:checked {
    background: var(--accent); border-color: var(--accent);
  }
  .check input[type="checkbox"]:checked::before { transform: scale(1); }
  .check input[type="checkbox"]:focus-visible {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
  }
  .check:hover input[type="checkbox"]:not(:checked) { border-color: var(--accent-line); }

  .select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%),
                      linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 18px) 22px, calc(100% - 13px) 22px;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right: 32px;
  }

  .form-inline { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
  .form-inline .field { min-width: 240px; }

  /* audit details — key/value list inside expandable row of audit table */
  dl.audit-detail {
    margin: 6px 0 0;
    padding: 10px 14px;
    background: var(--bg-2);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    display: grid;
    grid-template-columns: max-content minmax(0, 1fr);
    gap: 4px 18px;
  }
  dl.audit-detail dt {
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
  }
  dl.audit-detail dd {
    margin: 0;
    color: var(--text);
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  dl.audit-detail pre.audit-err {
    margin: 0;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 4px;
    color: var(--danger);
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--mono);
    font-size: 12px;
  }
  dl.audit-detail pre.audit-extras {
    margin: 0;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 4px;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--mono);
    font-size: 12px;
  }

  /* audit dashboard stat cards: equal-height row with body filling card and content centered */
  .audit-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .audit-stats > .card { display: flex; flex-direction: column; }
  .audit-stats > .card > .card-body {
    flex: 1;
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .stat-num {
    font: 600 32px/1.1 var(--serif);
    color: var(--text);
    letter-spacing: -0.015em;
    white-space: nowrap;
  }
  .stat-suffix {
    font: 500 12px/1 var(--sans);
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    white-space: nowrap;
  }

  /* cards / tables */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .card + .card { margin-top: 24px; }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--line);
    background: var(--bg-2);
    font: 600 12px/1 var(--sans); color: var(--text-soft);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .card-head .count { color: var(--muted); font-weight: 400; margin-left: 10px; }
  .card-head-actions { display: inline-flex; gap: 10px; font: 500 13px/1 var(--sans); color: var(--muted); text-transform: none; letter-spacing: 0; }
  .card-body { padding: 22px; }
  /* compact body for forms slotted into the same card as a data table */
  .card-body-tight { padding: 12px 16px; }
  .card-body-tight + .card-body-tight,
  table.data + .card-body-tight { border-top: 1px solid var(--line); }

  /* multi-line text input — same focus ring + colour palette as .input */
  .textarea {
    display: block; width: 100%; min-height: 76px;
    padding: 10px 14px;
    font: 400 16px/1.5 var(--mono);
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--radius);
    resize: vertical;
    transition: border-color .1s, box-shadow .1s;
  }
  .textarea::placeholder { color: var(--muted-2); }
  .textarea:hover { border-color: var(--muted-2); }
  .textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
  }

  /* output block — command result / error message under a form or button */
  .output {
    margin: 0; padding: 12px 14px;
    font: 400 13px/1.45 var(--mono);
    color: var(--text);
    background: var(--bg-2);
    border-radius: var(--radius);
    white-space: pre-wrap; word-break: break-word;
  }
  .output + .output, .form-inline + .output, .textarea + .btn + .output,
  .textarea + .output { margin-top: 8px; }
  .output.is-error { color: var(--danger); background: var(--danger-soft); }

  /* code display — static SQL / JSON shown inside a card body */
  .code {
    margin: 0; padding: 14px 18px;
    font: 400 13px/1.55 var(--mono);
    color: var(--text);
    background: var(--bg-2);
    overflow-x: auto;
  }
  .code.code-sm { font-size: 12px; }

  table.data {
    width: 100%; border-collapse: collapse;
    font-family: var(--mono); font-size: 18px;
  }
  table.data thead th {
    text-align: left;
    font: 600 11px/1 var(--sans);
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
    padding: 12px var(--cell-x);
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
    position: sticky; top: 0;
  }
  table.data tbody td {
    padding: var(--row-y) var(--cell-x);
    border-bottom: 1px solid var(--line-2);
    color: var(--text);
    white-space: nowrap;
    max-width: 420px;
    overflow: hidden; text-overflow: ellipsis;
    vertical-align: middle;
  }
  table.data tbody tr:last-child td { border-bottom: 0; }
  table.data tbody tr:hover td { background: var(--bg-2); }
  table.data td.num, table.data th.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.data td.null { color: var(--muted-2); font-style: italic; }
  table.data td.actions { text-align: right; padding-right: 14px; }
  table.data a.cell-link { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--muted-2); }
  table.data a.cell-link:hover { color: var(--accent); border-bottom-color: var(--accent); }
  table.data td.trunc { position: relative; cursor: help; }
  table.data td.trunc[title]:hover::after {
    content: attr(title);
    position: absolute; left: var(--cell-x); top: calc(100% - 4px); z-index: 10;
    max-width: 640px; white-space: normal;
    background: oklch(0.96 0.008 60); color: oklch(0.18 0.01 55);
    font-family: var(--mono); font-size: 18px; line-height: 1.5;
    padding: 12px 14px; border-radius: 4px;
    box-shadow: 0 10px 30px -8px rgba(0,0,0,0.6);
  }
  .mono-cell { font-family: var(--mono); color: var(--text); }
  .muted-cell { color: var(--muted); }

  .empty {
    padding: 64px 28px; text-align: center;
    color: var(--muted);
    font-family: var(--sans); font-size: 14px; line-height: 1.5;
  }
  .empty .ascii {
    display: inline-block; white-space: pre; color: var(--muted-2);
    line-height: 1.25; margin-bottom: 18px;
    font-size: 18px;
  }
  .empty h3 { color: var(--text); margin-bottom: 8px; font: 500 22px/1.25 var(--serif); letter-spacing: -0.005em; }
  .empty p { margin: 6px 0 16px; }
  .empty .suggest { color: var(--text-soft); }

  /* chips */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    height: 24px; padding: 0 10px;
    font: 600 11px/1 var(--sans);
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--bg-2); color: var(--text-soft);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .chip.ok    { color: var(--ok); background: var(--ok-soft); border-color: var(--ok-line); }
  .chip.warn  { color: var(--warn); background: var(--warn-soft); border-color: var(--warn-line); }
  .chip.danger{ color: var(--danger); background: var(--danger-soft); border-color: var(--danger-line); }
  .chip.mute  { color: var(--muted); }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  /* alerts */
  .alert {
    display: grid; grid-template-columns: auto 1fr auto; gap: 16px;
    align-items: center;
    padding: 14px 18px;
    border: 1px solid var(--line); border-left-width: 3px;
    border-radius: var(--radius);
    background: var(--surface);
    font-family: var(--sans); font-size: 14px; line-height: 1.5;
  }
  .alert .icon {
    width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 20px;
  }
  .alert .msg { color: var(--text); line-height: 1.5; }
  .alert .msg b { font-weight: 600; }
  .alert .msg code { background: var(--bg-2); padding: 2px 6px; border-radius: 3px; border: 1px solid var(--line); }
  .alert.warn  { background: var(--warn-soft);   border-color: var(--warn-line);   border-left-color: var(--warn);  color: var(--warn); }
  .alert.error { background: var(--danger-soft); border-color: var(--danger-line); border-left-color: var(--danger); color: var(--danger); }
  .alert.ok    { background: var(--ok-soft);     border-color: var(--ok-line);     border-left-color: var(--ok);    color: var(--ok); }
  .alert.info  { background: var(--bg-2);        border-color: var(--line);        border-left-color: var(--muted); }

  /* pager */
  .pager {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    font-family: var(--sans); font-size: 13px; color: var(--muted);
    background: var(--bg-2);
    border-top: 1px solid var(--line);
  }
  .pager .page-of b { color: var(--text); font-weight: 500; }
  .pager-group { display: inline-flex; gap: 10px; align-items: center; }
  .pager .btn-sm { min-width: 36px; justify-content: center; }

  /* toolbar */
  .toolbar {
    display: grid; grid-template-columns: 1fr 260px 200px auto; gap: 14px;
    align-items: end;
    padding: 18px 22px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
  }
  .toolbar .actions { display: inline-flex; gap: 10px; }

  /* meta row */
  .meta-row {
    display: flex; gap: 18px; align-items: center;
    font: 400 13px/1.4 var(--sans); color: var(--muted);
    padding: 12px 20px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
  }
  .meta-row b { color: var(--text-soft); font-weight: 500; }
  .meta-row .spacer { flex: 1; }

  /* login auth card */
  .auth-wrap {
    min-height: 720px;
    display: grid; place-items: center;
    padding: 80px 24px;
    background:
      radial-gradient(circle at 1px 1px, oklch(0.30 0.01 55) 1px, transparent 1px) 0 0 / 24px 24px,
      var(--bg);
  }
  .auth-card {
    width: 520px; max-width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 8px 24px -16px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .auth-head {
    padding: 12px 16px; border-bottom: 1px solid var(--line);
    background: oklch(0.28 0.013 55);
    font: 500 12px/1 var(--sans); color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    display: flex; align-items: center; gap: 10px;
  }
  .auth-head .dots { display: inline-flex; gap: 6px; }
  .auth-head .dots i { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .auth-head .dots i:nth-child(1) { background: var(--tl-red); }
  .auth-head .dots i:nth-child(2) { background: var(--tl-yellow); }
  .auth-head .dots i:nth-child(3) { background: var(--tl-green); }
  .auth-head .title { margin-left: 10px; color: var(--text-soft); }
  .auth-body { padding: 36px 36px 30px; }
  .auth-body .brand { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  .auth-body .brand .logo { font: 600 30px/1 var(--serif); color: var(--text); letter-spacing: -0.015em; }
  .auth-body .brand .logo::before { content: "▸ "; color: var(--accent); }
  .auth-body .brand .tag { font: 500 13px/1 var(--sans); color: var(--muted); }
  .auth-body h1 { font: 500 26px/1.25 var(--serif); margin-top: 22px; margin-bottom: 6px; letter-spacing: -0.01em; color: var(--text); }
  .auth-body .sub { color: var(--muted); font: 400 14px/1.5 var(--sans); margin-bottom: 24px; }
  .auth-body form { display: flex; flex-direction: column; gap: 18px; }
  .auth-body .submit-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .auth-body .submit-row .hint { font-family: var(--sans); font-size: 13px; color: var(--muted); }
  .auth-foot {
    padding: 14px 20px; border-top: 1px solid var(--line);
    background: var(--bg-2);
    font-family: var(--sans); font-size: 13px; color: var(--muted);
    display: flex; justify-content: space-between;
  }
  .kbd-key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 26px; height: 26px; padding: 0 8px;
    font: 500 16px/1 var(--mono); color: var(--text-soft);
    background: var(--surface); border: 1px solid var(--line); border-bottom-width: 2px;
    border-radius: 3px;
  }

  /* OAuth section on login card */
  .oauth-divider {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 14px;
    margin: 22px 0 14px;
    font: 500 11px/1 var(--sans); color: var(--muted-2);
    text-transform: uppercase; letter-spacing: 0.10em;
  }
  .oauth-divider::before, .oauth-divider::after {
    content: ""; height: 1px; background: var(--line);
  }
  .oauth-buttons { display: flex; flex-direction: column; gap: 10px; }
  .oauth-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px; padding: 10px 14px;
    font: 500 14px/1 var(--sans); color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--radius);
    text-decoration: none;
    transition: border-color .08s, background .08s, color .08s;
  }
  .oauth-btn:hover { border-color: var(--accent-line); background: var(--bg-2); color: var(--text); }
  .oauth-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .oauth-btn .provider-mark {
    color: var(--accent);
    font: 600 16px/1 var(--sans);
  }
  .oauth-btn:hover .provider-mark { color: var(--accent-2); }

  /* schema grid */
  .schema-grid td:first-child { color: var(--text); font-weight: 500; }
  .schema-grid .type { color: var(--accent); }

  /* records area */
  .records-scroll { overflow-x: auto; max-height: 640px; overflow-y: auto; }

  /* scrollbars */
  .records-scroll, .macwin-body, .page {
    scrollbar-width: thin;
    scrollbar-color: oklch(0.42 0.014 55) transparent;
  }
  .records-scroll::-webkit-scrollbar, .macwin-body::-webkit-scrollbar { width: 12px; height: 12px; }
  .records-scroll::-webkit-scrollbar-track, .macwin-body::-webkit-scrollbar-track { background: oklch(0.20 0.01 55); }
  .records-scroll::-webkit-scrollbar-thumb, .macwin-body::-webkit-scrollbar-thumb {
    background: oklch(0.36 0.013 55);
    border-radius: 6px;
    border: 2px solid oklch(0.20 0.01 55);
  }
  .records-scroll::-webkit-scrollbar-thumb:hover { background: oklch(0.50 0.015 55); }

  /* SVG icon helper */
  .icon { width: 1.1em; height: 1.1em; stroke: currentColor; vertical-align: -0.18em; flex-shrink: 0; }

  a { color: var(--accent); }

  /* ============ 2-col shell (collection detail page) ============
     Bumped from 260 → 280 in v1.14 to fit the new .tenant-sidebar
     density (mascot + tenant-id + section heads + row-count tags). */
  :root { --sidebar-w: 280px; }
  .shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  @media (max-width: 960px) {
    :root { --sidebar-w: 220px; }
  }

  /* When the page lives inside .shell, the right grid track is the actual
     content frame — drop the 1400 px max-width and tighten horizontal
     padding so cards never escape the column. `minmax(0, 1fr)` on the grid
     plus min-width:0 here lets long URLs / wide tables shrink instead of
     pushing the card past the sidebar boundary. */
  .shell > .main { min-width: 0; }
  .shell .page { max-width: 100%; padding: 28px 28px 100px; }
  .shell .page > .card { max-width: 100%; min-width: 0; }
  .shell .page .toolbar { grid-template-columns: minmax(0, 1fr) minmax(0, 220px) minmax(0, 160px) auto; }
  @media (max-width: 1100px) {
    .shell .page .toolbar { grid-template-columns: 1fr 1fr; }
    .shell .page .toolbar .actions { grid-column: 1 / -1; justify-content: flex-end; }
  }

  .sidebar {
    background: oklch(0.23 0.012 55);
    border-right: 1px solid var(--line-2);
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }
  .sidebar-head {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line-2);
    font: 600 11px/1 var(--sans);
    color: var(--muted-2);
    text-transform: uppercase; letter-spacing: 0.10em;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .sidebar-head .count { color: var(--muted-2); font-weight: 400; }
  .sidebar-list {
    overflow-y: auto; overflow-x: hidden;
    padding: 6px 0; flex: 1; min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: oklch(0.36 0.013 55) transparent;
  }
  .sidebar-list::-webkit-scrollbar { width: 8px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: oklch(0.36 0.013 55); border-radius: 3px; }
  .sidebar-list::-webkit-scrollbar-thumb:hover { background: oklch(0.50 0.015 55); }

  .col-item {
    display: grid; grid-template-columns: auto 1fr;
    gap: 10px; align-items: center;
    padding: 8px 16px;
    font: 500 14px/1.2 var(--sans);
    color: var(--text-soft);
    cursor: pointer; text-decoration: none;
    border-left: 2px solid transparent;
    transition: background .08s, color .08s, border-color .08s;
  }
  .col-item:hover { background: var(--bg-2); color: var(--text); }
  .col-item.on {
    background: var(--surface); color: var(--text);
    border-left-color: var(--accent);
  }
  .col-item .arrow { color: var(--muted-2); font-size: 14px; width: 10px; }
  .col-item.on .arrow { color: var(--accent); }

  /* login page special-case inside the shell — centers a single card */
  .auth-shell {
    flex: 1; min-height: 0;
    display: grid; place-items: center;
    padding: 40px 20px;
    background:
      radial-gradient(circle at 1px 1px, oklch(0.30 0.01 55) 1px, transparent 1px) 0 0 / 22px 22px,
      var(--bg);
    overflow-y: auto;
  }

  /* mascot canvas */
  canvas.pix { image-rendering: pixelated; display: block; }

  /* Y: files page */
  .disk-banner {
    padding: 10px 14px;
    background: var(--bg-2, #f4f4f4);
    border-radius: 6px;
    margin-bottom: 18px;
    font-family: var(--mono, monospace);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .disk-banner.low { background: var(--danger-soft, #fee); color: var(--danger, #c22); }
  .disk-banner .warn { margin-left: auto; color: var(--danger, #c22); font-weight: bold; }

  .vis-tabs { display: flex; gap: 8px; margin: 12px 16px; }
  .vis-tab {
    padding: 6px 12px;
    border: 1px solid var(--border, var(--line, #ccc));
    border-radius: 4px;
    text-decoration: none;
    font-size: 13px;
    color: inherit;
  }
  .vis-tab.active {
    background: var(--accent, #333);
    color: var(--accent-fg, #fff);
    border-color: var(--accent, #333);
  }

  .upload-fields {
    display: flex;
    flex-wrap: wrap;
    gap: 18px 28px;
    margin: 12px 0 4px;
    align-items: center;
  }
  .upload-fields .field {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .upload-fields .field-label {
    font: 600 12px/1 var(--sans);
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    text-transform: lowercase;
  }

  /* Pill segmented control (replaces raw radio buttons) */
  .pill-toggle {
    display: inline-flex;
    gap: 2px;
    padding: 3px;
    background: var(--bg-1, var(--bg));
    border: 1px solid var(--line);
    border-radius: 999px;
  }
  .pill-toggle input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .pill-toggle label {
    cursor: pointer;
    padding: 6px 16px;
    font: 500 13px/1 var(--sans);
    color: var(--muted);
    border-radius: 999px;
    user-select: none;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }
  .pill-toggle label:hover { color: var(--text); }
  .pill-toggle input:checked + label {
    background: var(--accent);
    color: oklch(0.14 0.02 var(--accent-h));
  }
  .pill-toggle input:focus-visible + label {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ===== Files admin (host /admin/files + per-tenant /admin/tenants/<id>/files) =====
     Shared by `files.html` and `tenant_files_admin.html`. */

  /* Card boundary: the card never stretches past its container; a wide
     table scrolls horizontally inside .pub-scroll. Actions column is
     sticky to the right so it stays visible while the name scrolls. */
  .pub-scroll { overflow-x: auto; position: relative; }
  table.pub-files {
    width: 100%;
    min-width: 800px;       /* readable floor; narrower viewports scroll */
    border-collapse: collapse;
  }
  table.pub-files colgroup .col-name    { width: auto; }
  table.pub-files colgroup .col-vis     { width: 90px; }
  table.pub-files colgroup .col-type    { width: 140px; }
  table.pub-files colgroup .col-size    { width: 90px; }
  table.pub-files colgroup .col-time    { width: 180px; }
  table.pub-files colgroup .col-actions { width: 1px; }

  /* Name + type truncate inside a wrapper div (reliable across browsers). */
  .trunc-inner {
    display: block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  table.pub-files td.cell-name a { color: var(--text); text-decoration: none; }
  table.pub-files td.cell-name a:hover { color: var(--accent); text-decoration: underline; }

  /* Visibility chips */
  .chip-vis-public  { background: var(--ok-soft, #1a2e1a); color: var(--ok, #80c880); border: 1px solid var(--ok-line, #446044); }
  .chip-vis-private { background: var(--warn-soft, #2e2a14); color: var(--warn, #d4b84a); border: 1px solid var(--warn-line, #5a4e1a); }

  table.pub-files td.cell-size { white-space: nowrap; }
  table.pub-files td.cell-time { white-space: nowrap; }

  /* Sticky actions — stays visible even if horizontal scroll happens. */
  table.pub-files td.cell-actions,
  table.pub-files th:last-child {
    position: sticky;
    right: 0;
    white-space: nowrap;
    background: var(--surface);
    box-shadow: -8px 0 10px -6px rgba(0, 0, 0, 0.45);
    z-index: 1;
  }
  table.pub-files th:last-child { background: var(--bg-2); }

  /* Upload drop zone */
  .dropzone {
    position: relative;
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
    background: var(--bg-1);
    padding: 32px 20px;
    transition: border-color .12s, background .12s;
    cursor: pointer;
  }
  .dropzone:hover { border-color: var(--muted-2); }
  .dropzone.is-dragover {
    border-color: var(--accent);
    border-style: solid;
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.08);
  }
  .dropzone-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    font-family: var(--sans);
    color: var(--muted);
  }
  .dropzone-prompt { display: inline-flex; align-items: center; gap: 10px; font-size: 18px; }
  .dz-arrow { color: var(--accent); font-weight: 600; }
  .dz-or { color: var(--muted-2); }
  .dropzone-name {
    font-size: 16px;
    color: var(--text);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 8px;
  }
  .dropzone-name[data-empty="1"] { color: var(--muted-2); font-style: italic; }
  .dropzone-name[data-state="error"] { color: var(--danger); }

  .filepick-btn {
    display: inline-flex; align-items: center;
    padding: 6px 14px;
    font: 500 13px/1 var(--sans);
    color: var(--text-soft);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    cursor: pointer;
    user-select: none;
    transition: color .1s, background .1s, border-color .1s;
  }
  .filepick-btn:hover { color: var(--text); border-color: var(--muted-2); background: var(--bg-3); }
  .filepick-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .filepick-btn-label::before { content: "["; color: var(--muted); margin-right: 4px; }
  .filepick-btn-label::after  { content: "]"; color: var(--muted); margin-left: 4px; }
  .filepick-input {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  .upload-row {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 14px; flex-wrap: wrap;
    margin-top: 14px;
    min-height: 32px;
  }
  .upload-hint { font-family: var(--sans); font-size: 13px; color: var(--muted); flex: 1 1 auto; }
  .upload-hint.ready { color: var(--accent); }
  .upload-hint.error { color: var(--danger); }

  /* Pager select (host files page only) — smaller than the default .select
     with a caret that stays inside the box at 30px height. */
  .pager-form { display: inline-flex; gap: 6px; align-items: center; margin: 0; }
  .pager-label { color: var(--muted); font-family: var(--sans); font-size: 13px; }
  .pager-select {
    height: 30px;
    padding: 0 26px 0 10px;
    font: 400 15px/1 var(--mono);
    color: var(--text);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--muted) 50%),
      linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position:
      calc(100% - 14px) 13px,
      calc(100% - 9px) 13px;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
  }
  .pager-select:hover { border-color: var(--muted-2); }
  .pager-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }

  /* Modal (shared alert + prompt replacement) */
  .modal-overlay {
    position: fixed; inset: 0;
    background: oklch(0 0 0 / 0.55);
    display: grid; place-items: center;
    z-index: 100;
    animation: modalFade .12s ease-out;
  }
  .modal-overlay[hidden] { display: none; }
  @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 24px 60px oklch(0 0 0 / 0.5);
    padding: 22px 24px 20px;
    min-width: 360px;
    max-width: min(560px, calc(100vw - 32px));
    color: var(--text);
    font-family: var(--sans);
  }
  .modal-title {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 10px;
    color: var(--text);
  }
  .modal-body {
    font-size: 15px;
    color: var(--text-soft);
    margin: 0 0 16px;
    word-break: break-all;
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .modal-body code {
    display: block;
    padding: 10px 44px 10px 12px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    font: 400 13px/1.4 var(--mono);
    color: var(--accent);
    word-break: break-all;
    white-space: pre-wrap;
  }
  .modal-code-wrap {
    position: relative;
    margin-top: 8px;
  }
  .modal-code-copy {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 30px;
    height: 30px;
    padding: 0;
    display: grid;
    place-items: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    transition: color .1s, background .1s, border-color .1s;
  }
  .modal-code-copy:hover {
    color: var(--text);
    background: var(--bg-3);
    border-color: var(--line);
  }
  .modal-code-copy:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .modal-code-copy.is-ok { color: var(--accent); }
  .modal-code-copy .icon { width: 16px; height: 16px; }
  .modal-input {
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 14px;
    font: 400 15px/1.3 var(--mono);
    color: var(--text);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .modal-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .modal-variant-danger .modal-title { color: var(--danger); }

  /* Markdown body — used by the on-disk doc renderer (changelog / architecture). */
  .markdown-body {
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
  }
  .markdown-body h1 { font-size: 28px; margin: 0 0 18px; line-height: 1.25; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
  .markdown-body h2 { font-size: 22px; margin: 32px 0 14px; line-height: 1.3; border-bottom: 1px solid var(--line-2); padding-bottom: 6px; }
  .markdown-body h3 { font-size: 18px; margin: 24px 0 10px; color: var(--text-soft); }
  .markdown-body h4 { font-size: 16px; margin: 20px 0 8px; color: var(--text-soft); }
  .markdown-body p { margin: 0 0 14px; line-height: 1.6; }
  .markdown-body a { color: var(--accent); text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }
  .markdown-body code {
    font-family: var(--mono);
    font-size: 0.92em;
    background: oklch(0.20 0.01 55);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--text);
  }
  .markdown-body pre {
    font-family: var(--mono);
    font-size: 14px;
    background: oklch(0.20 0.01 55);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    overflow-x: auto;
    margin: 0 0 16px;
    line-height: 1.5;
  }
  .markdown-body pre code {
    background: transparent;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }
  .markdown-body pre.mermaid {
    background: transparent;
    border: 0;
    padding: 16px 0;
    text-align: center;
    overflow-x: auto;
  }
  .markdown-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 16px;
    font-size: 15px;
  }
  .markdown-body th, .markdown-body td {
    padding: 8px 12px;
    border: 1px solid var(--line);
    text-align: left;
  }
  .markdown-body th {
    background: var(--bg-2);
    color: var(--text-soft);
    font-weight: 600;
  }
  .markdown-body tbody tr:nth-child(even) td { background: var(--bg-2); }
  .markdown-body blockquote {
    margin: 0 0 16px;
    padding: 4px 16px;
    border-left: 3px solid var(--accent-line);
    color: var(--text-soft);
    background: oklch(0.22 0.012 55);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .markdown-body blockquote p:last-child { margin-bottom: 0; }
  .markdown-body ul, .markdown-body ol { padding-left: 28px; margin: 0 0 14px; }
  .markdown-body li { margin: 4px 0; line-height: 1.6; }
  .markdown-body li > p { margin: 0 0 6px; }
  .markdown-body hr {
    border: 0;
    border-top: 1px solid var(--line);
    margin: 24px 0;
  }
  .markdown-body img { max-width: 100%; height: auto; }

  /* Docs viewer: 2-col with a sticky in-page TOC on the left. Scoped to
     /admin/_docs/* so it doesn't disturb the existing collection .shell. */
  .docs-shell {
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
    gap: 28px;
    align-items: flex-start;
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 28px 100px;
  }
  .docs-shell > .docs-content { min-width: 0; }
  .docs-toc {
    position: sticky;
    top: 24px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    padding: 14px 14px 16px;
    background: oklch(0.23 0.012 55);
    border: 1px solid var(--line-2);
    border-radius: var(--radius);
    scrollbar-width: thin;
    scrollbar-color: oklch(0.36 0.013 55) transparent;
  }
  .docs-toc-head {
    font: 600 11px/1 var(--sans);
    color: var(--muted-2);
    text-transform: uppercase;
    letter-spacing: 0.10em;
    padding: 2px 6px 10px;
    margin: 0;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 8px;
  }
  .docs-toc-head .count { color: var(--muted); font-weight: 400; }
  .docs-toc-list { display: flex; flex-direction: column; gap: 1px; }
  .docs-toc-list a {
    display: block;
    padding: 6px 10px;
    font: 500 13px/1.4 var(--sans);
    color: var(--text-soft);
    text-decoration: none;
    border-left: 2px solid transparent;
    border-radius: 3px;
    word-break: break-word;
    transition: background .08s, color .08s, border-color .08s;
  }
  .docs-toc-list a:hover {
    color: var(--text);
    background: var(--bg-2);
    border-left-color: var(--muted-2);
    text-decoration: none;
  }
  .docs-toc-list a.active {
    color: var(--text);
    background: var(--surface);
    border-left-color: var(--accent);
  }
  .markdown-body h2 { scroll-margin-top: 24px; }
  @media (max-width: 1100px) {
    .docs-shell { grid-template-columns: 200px minmax(0, 1fr); gap: 20px; padding: 20px 20px 80px; }
  }
  @media (max-width: 800px) {
    .docs-shell { grid-template-columns: 1fr; gap: 16px; }
    .docs-toc { position: static; max-height: 240px; }
  }

  /* =====================================================================
     Components for the v1.14 redesign (added 2026-05-16).

     These are additive — existing pages continue to use the legacy
     .chip / .sidebar / etc. New pages built against the open-design
     mockup use the components below. Once every page is migrated the
     legacy classes can be retired in a single sweep.
     ===================================================================== */

  /* extra chip variants matching the cozy palette */
  .chip.info   { color: var(--info);   background: var(--info-soft);   border-color: var(--info-line); }
  .chip.lilac  { color: var(--lilac);  background: var(--lilac-soft);  border-color: var(--lilac-line); }
  .chip.accent { color: var(--accent); background: var(--accent-soft); border-color: var(--accent-line); }

  /* role-badge — small label in the topbar telling you which auth
     identity this session holds. Anchored visually next to the
     account dropdown.

     <span class="role-badge admin">admin</span>
     <span class="role-badge service">service</span>
     <span class="role-badge anon">anon</span>
     <span class="role-badge user">user</span>
  */
  .role-badge {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 8px;
    font: 600 12px/1 var(--mono);
    border-radius: 11px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--text-soft);
    text-transform: lowercase; letter-spacing: 0.04em;
  }
  .role-badge::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }
  .role-badge.admin   { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
  .role-badge.service { color: var(--info);   border-color: var(--info-line);   background: var(--info-soft); }
  .role-badge.anon    { color: var(--muted);  border-color: var(--line); }
  .role-badge.user    { color: var(--ok);     border-color: var(--ok-line);     background: var(--ok-soft); }

  /* plane-pill — sidebar header indicator showing which plane
     ("admin" host-level vs "tenant" data-level) the user is in.
     Lives at the very top of the sidebar above the nav list.

     <div class="plane-pill admin">plane · admin</div>
     <div class="plane-pill tenant">plane · tenant</div>
  */
  .plane-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    font: 600 11px/1 var(--mono);
    text-transform: uppercase; letter-spacing: 0.08em;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--muted);
  }
  .plane-pill::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .plane-pill.admin  { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
  .plane-pill.tenant { color: var(--lilac);  border-color: var(--lilac-line);  background: var(--lilac-soft); }

  /* stat-tile — large number + label for overview dashboards.
     Wraps content for the tenant Overview page.

     <div class="stat-tile">
       <div class="stat-tile-label">collections</div>
       <div class="stat-tile-value">42</div>
       <div class="stat-tile-delta ok">+1 this week</div>
     </div>
  */
  .stat-tile {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 4px;
    min-width: 0;
  }
  .stat-tile-label {
    font: 500 12px/1 var(--mono);
    color: var(--muted);
    text-transform: lowercase; letter-spacing: 0.06em;
  }
  .stat-tile-value {
    font: 600 32px/1.1 var(--serif);
    color: var(--text);
    letter-spacing: -0.01em;
    word-break: break-all;
  }
  .stat-tile-delta {
    font: 500 13px/1.3 var(--mono);
    color: var(--muted-2);
    margin-top: 4px;
  }
  .stat-tile-delta.ok { color: var(--ok); }
  .stat-tile-delta.bad { color: var(--danger); }

  /* badge-mini — schema-field annotations rendered alongside field
     name in the rows view. PK / FK / JSON / UNIQ / IDX / NULL / VEC.

     <span class="badge-mini pk">PK</span>
  */
  .badge-mini {
    display: inline-flex; align-items: center;
    height: 18px; padding: 0 6px;
    font: 600 10px/1 var(--mono);
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .badge-mini.pk   { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
  .badge-mini.fk   { color: var(--info);   border-color: var(--info-line);   background: var(--info-soft); }
  .badge-mini.json { color: var(--lilac);  border-color: var(--lilac-line);  background: var(--lilac-soft); }
  .badge-mini.uniq { color: var(--ok);     border-color: var(--ok-line);     background: var(--ok-soft); }
  .badge-mini.idx  { color: var(--warn);   border-color: var(--warn-line);   background: var(--warn-soft); }
  .badge-mini.vec  { color: var(--lilac);  border-color: var(--lilac-line);  background: var(--lilac-soft); }
  .badge-mini.null { color: var(--muted-2); font-style: italic; }

  /* meter — thin progress bar used in dashboards.
     <div class="meter"><i style="width: 64%"></i></div>
  */
  .meter {
    height: 6px;
    background: var(--bg-3);
    border-radius: 3px;
    overflow: hidden;
  }
  .meter > i {
    display: block;
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width .25s ease-out;
  }
  .meter.warn > i   { background: var(--warn); }
  .meter.danger > i { background: var(--danger); }
  .meter.ok > i     { background: var(--ok); }

  /* toast stack — bottom-right, ephemeral notifications.
     <div class="toast-stack">
       <div class="toast ok">Saved.</div>
       <div class="toast danger">Failed: DB_ERROR</div>
     </div>
  */
  .toast-stack {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 200;
    display: flex; flex-direction: column-reverse; gap: 10px;
    max-width: calc(100vw - 48px);
    pointer-events: none;
  }
  .toast {
    pointer-events: auto;
    min-width: 280px; max-width: 420px;
    padding: 12px 16px;
    font: 500 14px/1.4 var(--sans);
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--muted);
    border-radius: var(--radius);
    box-shadow: 0 12px 32px -12px rgba(0,0,0,0.55), 0 4px 8px -4px rgba(0,0,0,0.35);
    animation: toastSlide .18s ease-out;
  }
  .toast.ok     { border-left-color: var(--ok); }
  .toast.warn   { border-left-color: var(--warn); }
  .toast.danger { border-left-color: var(--danger); }
  .toast.info   { border-left-color: var(--info); }
  @keyframes toastSlide {
    from { transform: translateY(8px); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }

  /* cmd-K palette — global tenant / command picker overlay. Shown
     when the user hits ⌘K (or Ctrl+K). Wire-up is JS in design.html;
     production wiring will move into a shared partial.

     <div class="cmdk-overlay" hidden>
       <div class="cmdk">
         <input class="cmdk-input" placeholder="Find tenant or command…">
         <div class="cmdk-list">
           <a class="cmdk-item" href="...">
             <span class="cmdk-icon">🏠</span>
             <span class="cmdk-label">switch to tenant <b>acme</b></span>
             <span class="cmdk-hint">↵</span>
           </a>
         </div>
       </div>
     </div>
  */
  .cmdk-overlay {
    position: fixed; inset: 0;
    background: oklch(0 0 0 / 0.4);
    backdrop-filter: blur(2px);
    display: grid; place-items: start center;
    padding-top: 12vh;
    z-index: 150;
    animation: modalFade .12s ease-out;
  }
  .cmdk-overlay[hidden] { display: none; }
  .cmdk {
    width: min(640px, calc(100vw - 32px));
    background: var(--surface);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    box-shadow: 0 24px 60px -12px rgba(0,0,0,0.55), 0 8px 16px -8px rgba(0,0,0,0.4);
    overflow: hidden;
    display: flex; flex-direction: column;
    max-height: 70vh;
  }
  .cmdk-input {
    height: 52px; padding: 0 18px;
    font: 400 16px/1 var(--sans);
    color: var(--text);
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--line);
  }
  .cmdk-input::placeholder { color: var(--muted-2); }
  .cmdk-input:focus { outline: none; }
  .cmdk-list {
    overflow-y: auto;
    padding: 6px;
    scrollbar-width: thin;
  }
  .cmdk-item {
    display: grid; grid-template-columns: 28px 1fr auto;
    gap: 12px; align-items: center;
    padding: 10px 12px;
    font: 500 14px/1.3 var(--sans);
    color: var(--text-soft);
    text-decoration: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .cmdk-item:hover, .cmdk-item.on {
    background: var(--accent-soft);
    color: var(--text);
  }
  .cmdk-item.on .cmdk-hint { color: var(--accent); }
  .cmdk-icon { font-size: 18px; text-align: center; }
  .cmdk-label b { color: var(--text); font-weight: 600; }
  .cmdk-hint {
    font: 500 11px/1 var(--mono);
    color: var(--muted);
    padding: 4px 6px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--bg-2);
  }

  /* tenant-sidebar — the sidebar variant used in the new design.
     Different from collection .sidebar in that it carries a header
     block (mascot + tenant name + plane pill), a search row, and
     a multi-section nav list.

     Use grid `--tenant-sidebar-w: 280px` instead of `--sidebar-w` so
     the legacy 2-col shell on existing pages is untouched. */
  :root { --tenant-sidebar-w: 280px; }
  .tenant-shell {
    display: grid;
    grid-template-columns: var(--tenant-sidebar-w) minmax(0, 1fr);
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .tenant-sidebar {
    background: oklch(0.21 0.012 50);
    border-right: 1px solid var(--line-2);
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }
  .tenant-sidebar-head {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--line-2);
    display: flex; flex-direction: column; gap: 10px;
    flex-shrink: 0;
  }
  .tenant-sidebar-brand {
    display: grid; grid-template-columns: 32px 1fr; gap: 10px; align-items: center;
  }
  .tenant-sidebar-brand .name {
    font: 600 16px/1.2 var(--serif);
    color: var(--text);
    letter-spacing: -0.005em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tenant-sidebar-brand .id {
    font: 500 11px/1 var(--mono);
    color: var(--muted);
    margin-top: 3px;
  }
  .tenant-sidebar-section {
    padding: 12px 0 4px;
  }
  .tenant-sidebar-section + .tenant-sidebar-section {
    border-top: 1px solid var(--line-2);
  }
  .tenant-sidebar-section-head {
    padding: 4px 18px;
    font: 600 10px/1 var(--sans);
    color: var(--muted-2);
    text-transform: uppercase; letter-spacing: 0.10em;
  }
  .tenant-sidebar-list {
    overflow-y: auto; overflow-x: hidden;
    flex: 1; min-height: 0;
    padding: 4px 0 8px;
    scrollbar-width: thin;
    scrollbar-color: oklch(0.36 0.013 55) transparent;
  }
  .tenant-sidebar-list::-webkit-scrollbar { width: 8px; }
  .tenant-sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .tenant-sidebar-list::-webkit-scrollbar-thumb { background: oklch(0.36 0.013 55); border-radius: 3px; }
  .tenant-nav-item {
    display: grid; grid-template-columns: 22px 1fr auto;
    gap: 10px; align-items: center;
    padding: 8px 18px;
    font: 500 14px/1.2 var(--sans);
    color: var(--text-soft);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: background .08s, color .08s, border-color .08s;
  }
  .tenant-nav-item:hover { background: var(--bg-2); color: var(--text); }
  .tenant-nav-item.on {
    background: var(--surface);
    color: var(--text);
    border-left-color: var(--accent);
  }
  .tenant-nav-item .nav-icon { font-size: 14px; text-align: center; color: var(--muted); }
  .tenant-nav-item.on .nav-icon { color: var(--accent); }
  .tenant-nav-item .nav-tag {
    font: 500 10px/1 var(--mono);
    color: var(--muted-2);
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--bg-2);
    border: 1px solid var(--line);
  }
  .tenant-nav-item.on .nav-tag {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: var(--accent-line);
  }
  .tenant-sidebar-foot {
    padding: 12px 18px;
    border-top: 1px solid var(--line-2);
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    font: 500 12px/1.2 var(--mono);
    color: var(--muted);
    flex-shrink: 0;
  }

  /* serif display helpers for the new pages — opt-in. */
  .display-serif { font-family: var(--serif); font-weight: 500; letter-spacing: -0.01em; }
  .display-serif-h1 { font: 500 36px/1.15 var(--serif); letter-spacing: -0.015em; }
  .display-serif-h2 { font: 500 26px/1.25 var(--serif); letter-spacing: -0.01em; }
  .display-serif-italic { font-style: italic; }

  /* kbd shortcut hint — used inline in prose ("press ⌘K"). */
  .kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 22px; padding: 0 6px;
    font: 600 11px/1 var(--mono);
    color: var(--text-soft);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 4px;
  }

  /* =====================================================================
     Mockup-aligned design system (full overhaul 2026-05-17).
     Sourced 1:1 from the open-design "Studio" mockup; adapted to drust's
     existing oklch tokens so the apricot hue stays consistent everywhere.
     ===================================================================== */

  /* eyebrow — apricot mono caps above .view-title */
  .eyebrow {
    font: 500 11px/1 var(--mono);
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--accent);
  }

  /* view-head — replaces .pagehead. Optional .row variant for inline buttons. */
  .view-head {
    display: flex; align-items: flex-end;
    gap: 24px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .view-head .grow { flex: 1; min-width: 0; }
  .view-title {
    font: 500 34px/1.08 var(--serif);
    letter-spacing: -0.018em;
    color: var(--text);
    margin: 6px 0 0;
  }
  .view-sub {
    font: 400 14px/1.5 var(--sans);
    color: var(--text-soft);
    max-width: 60ch;
    margin: 6px 0 0;
  }
  .view-sub code, .view-head code {
    font: 500 12px/1 var(--mono); color: var(--text-soft);
    background: var(--bg-2); padding: 1px 6px; border-radius: 5px;
    border: 1px solid var(--line);
  }
  .view-sub a, .view-head a { color: var(--accent); text-decoration: none; }

  /* pill family — for status/role markers. Replaces .chip.* on new pages. */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 10px;
    font: 600 11px/1 var(--mono);
    letter-spacing: 0.04em; text-transform: uppercase;
    border-radius: 11px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--text-soft);
    white-space: nowrap;
  }
  .pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.85; }
  .pill.mint   { color: var(--ok);     background: var(--ok-soft);     border-color: var(--ok-line); }
  .pill.warn   { color: var(--warn);   background: var(--warn-soft);   border-color: var(--warn-line); }
  .pill.danger { color: var(--danger); background: var(--danger-soft); border-color: var(--danger-line); }
  .pill.info   { color: var(--info);   background: var(--info-soft);   border-color: var(--info-line); }
  .pill.accent { color: var(--accent); background: var(--accent-soft); border-color: var(--accent-line); }
  .pill.lilac  { color: var(--lilac);  background: var(--lilac-soft);  border-color: var(--lilac-line); }
  .pill.user   { color: var(--info);   background: var(--info-soft);   border-color: var(--info-line); }
  .pill.muted  { color: var(--muted); }

  /* banner family — replaces .alert.* on new pages. */
  .banner {
    display: grid; grid-template-columns: auto 1fr;
    gap: 12px; align-items: start;
    padding: 14px 16px;
    border: 1px solid;
    border-radius: var(--radius-lg);
    font: 400 14px/1.5 var(--sans);
  }
  .banner .b-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    color: currentColor; flex-shrink: 0; margin-top: 2px;
  }
  .banner .b-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .banner .b-body { color: var(--text); min-width: 0; }
  .banner .b-title {
    font: 500 15px/1.3 var(--serif);
    letter-spacing: -0.005em;
    color: inherit;
    margin: 0 0 2px;
  }
  .banner .b-body p { margin: 2px 0 0; color: var(--text-soft); }
  .banner .b-body code {
    background: var(--bg-2); padding: 1px 6px; border-radius: 5px;
    border: 1px solid var(--line); font: 500 12px/1 var(--mono); color: var(--text-soft);
  }
  .banner .b-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .banner.info    { color: var(--info);   background: var(--info-soft);   border-color: var(--info-line); }
  .banner.warn    { color: var(--warn);   background: var(--warn-soft);   border-color: var(--warn-line); }
  .banner.danger  { color: var(--danger); background: var(--danger-soft); border-color: var(--danger-line); }
  .banner.success { color: var(--ok);     background: var(--ok-soft);     border-color: var(--ok-line); }

  /* stat family — replaces .stat-tile on new pages. */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 7px;
    position: relative; overflow: hidden;
  }
  .stat .label {
    font: 500 10px/1 var(--mono);
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; gap: 7px;
  }
  .stat .val {
    font: 500 32px/1 var(--serif);
    letter-spacing: -0.018em;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .stat .val .unit {
    font: 400 14px/1 var(--sans);
    color: var(--muted);
    margin-left: 4px; letter-spacing: 0;
  }
  .stat .meta {
    font: 400 11.5px/1 var(--sans);
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .stat .meta .up   { color: var(--ok); }
  .stat .meta .down { color: var(--danger); }
  .stat.accent-edge { border-color: var(--accent-line); }
  .stat.accent-edge::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent 80%);
  }

  /* brand block — top of sidebar. mark + name + meta + (optional) ver. */
  .brand {
    display: grid; grid-template-columns: 36px 1fr auto;
    gap: 10px; align-items: center;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--line-2);
  }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
    box-shadow: inset 0 0 0 1px oklch(1 0 0 / 0.12), 0 0 0 1px var(--accent-soft);
  }
  .brand-text { min-width: 0; }
  .brand-name {
    font: 500 19px/1 var(--serif);
    letter-spacing: -0.015em;
    color: var(--text);
  }
  .brand-meta {
    font: 500 10px/1.2 var(--mono);
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }
  .brand-ver {
    font: 500 10px/1 var(--mono);
    letter-spacing: 0.08em;
    color: var(--muted-2);
    align-self: flex-start;
  }

  /* plane-pill — restructured (v2). Lives just below .brand, optional click. */
  .plane-pill {
    margin: 12px 14px 4px;
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 10px; align-items: center;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    background: var(--surface);
    text-decoration: none; color: inherit;
    transition: border-color .15s;
    /* override legacy text-only pill style */
    text-transform: none; letter-spacing: 0;
    font: 500 12px/1 var(--sans);
  }
  .plane-pill::before { content: none; }   /* nuke legacy ::before dot */
  .plane-pill.clickable { cursor: pointer; }
  .plane-pill.clickable:hover { border-color: var(--line-2); }
  .plane-pill > .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
    flex-shrink: 0;
  }
  .plane-pill .body { min-width: 0; }
  .plane-pill .label { font: 500 9.5px/1 var(--mono); letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .plane-pill .name  { font: 500 13px/1.1 var(--sans); color: var(--text); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .plane-pill .id    { font: 500 10px/1 var(--mono); color: var(--muted-2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .plane-pill .chev  { color: var(--muted-2); flex-shrink: 0; }
  .plane-pill .chev svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.7; }
  /* tenant-flavored accent stays apricot (mockup) — admin uses lilac wheel later if we add it */
  .plane-pill.admin  { background: var(--surface); color: inherit; border-color: var(--line); }
  .plane-pill.tenant { background: var(--surface); color: inherit; border-color: var(--line); }

  /* back-strip — "← Back to all tenants" row above plane-pill */
  .back-strip {
    display: flex; align-items: center; gap: 7px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--line-2);
    color: var(--muted); font: 500 12px/1.2 var(--sans);
    text-decoration: none; cursor: pointer;
    transition: color .12s, background .12s;
  }
  .back-strip:hover { color: var(--text-soft); background: var(--bg-2); }
  .back-strip svg { width: 14px; height: 14px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; }

  /* nav (sidebar) — new clean section list */
  .nav { padding: 6px 10px; flex: 1; overflow-y: auto; min-height: 0; }
  .nav-section {
    margin: 14px 0 4px; padding: 0 8px;
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    font: 500 9.5px/1 var(--mono);
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted);
  }
  .nav-section .count { color: var(--muted-2); font-weight: 400; letter-spacing: 0; text-transform: none; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 7px 10px; border-radius: 10px;
    font: 500 13px/1.2 var(--sans);
    color: var(--text-soft);
    text-decoration: none; cursor: pointer; user-select: none;
    transition: background .12s, color .12s;
  }
  .nav-item:hover { background: var(--bg-2); color: var(--text); }
  .nav-item.on {
    background: var(--surface); color: var(--text);
    box-shadow: inset 0 0 0 1px var(--line-2);
  }
  .nav-item > .nav-icon {
    width: 16px; height: 16px; flex-shrink: 0;
    color: var(--muted);
    display: grid; place-items: center;
  }
  .nav-item > .nav-icon svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.7; }
  .nav-item:hover > .nav-icon { color: var(--text-soft); }
  .nav-item.on > .nav-icon { color: var(--accent); }
  .nav-item .nav-badge {
    margin-left: auto;
    font: 500 10px/1 var(--mono); letter-spacing: 0.04em;
    color: var(--muted);
    background: var(--surface);
    padding: 2px 7px; border-radius: 9999px;
    border: 1px solid var(--line);
  }
  .nav-item .nav-badge.alert { color: var(--danger); background: var(--danger-soft); border-color: var(--danger-line); }
  .nav-collection {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 10px 5px 14px; border-radius: 8px;
    color: var(--text-soft);
    font: 500 12px/1.2 var(--mono);
    letter-spacing: 0.02em;
    cursor: pointer; text-decoration: none;
  }
  .nav-collection:hover { background: var(--bg-2); color: var(--text); }
  .nav-collection > .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted-2); flex-shrink: 0; }
  .nav-collection .count { margin-left: auto; color: var(--muted-2); font: 500 10.5px/1 var(--mono); }
  .nav-collection.on { background: var(--surface); color: var(--text); box-shadow: inset 0 0 0 1px var(--line-2); }
  .nav-collection.on > .dot { background: var(--accent); }

  /* sidebar foot — who-av + name/mail + status-pulse */
  .sidebar-foot {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    border-top: 1px solid var(--line-2);
    font: 500 11.5px/1.3 var(--sans);
    color: var(--muted);
    flex-shrink: 0;
  }
  .sidebar-foot .who { flex: 1; min-width: 0; }
  .sidebar-foot .who-name { color: var(--text-soft); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-foot .who-mail { font: 500 10.5px/1.2 var(--mono); color: var(--muted-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .sidebar-foot .who-av {
    width: 24px; height: 24px; border-radius: 8px;
    background: linear-gradient(135deg, oklch(0.50 0.06 30), var(--accent));
    display: grid; place-items: center;
    color: #fff;
    font: 700 10px/1 var(--mono);
    flex-shrink: 0;
  }
  .status-pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ok); flex-shrink: 0;
    position: relative;
  }
  .status-pulse::after {
    content: ""; position: absolute; inset: -3px; border-radius: 50%;
    background: var(--ok); opacity: 0.35;
    animation: pulse-ring 2s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(0.6); opacity: 0.5; }
    100% { transform: scale(2.2); opacity: 0;   }
  }

  /* override .tenant-sidebar — adopt mockup brand-mark + sidebar-foot.
     Keep the existing tenant-sidebar grid + max-height intact. */
  .tenant-sidebar-head {
    padding: 0;
    border-bottom: 0;
    display: block;
  }
  /* When a template uses _collection_sidebar.html, .brand / .plane-pill /
     .nav / .sidebar-foot rendered inside .tenant-sidebar inherit the
     above v2 styles directly. */

  /* topbar override — match mockup */
  .topbar {
    height: 50px;
    padding: 0 22px;
    grid-template-columns: 1fr auto;
    gap: 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--line-2);
    backdrop-filter: saturate(180%) blur(6px);
  }
  /* legacy .topbar-crumbs → forward to new .crumbs styles */
  .topbar-crumbs, .topbar .crumbs {
    display: inline-flex; align-items: center; gap: 8px;
    font: 500 13px/1 var(--sans);
    color: var(--text-soft);
    min-width: 0; overflow: hidden;
  }
  .topbar-crumbs a, .topbar .crumbs a { color: var(--text-soft); text-decoration: none; transition: color .12s; white-space: nowrap; }
  .topbar-crumbs a:hover, .topbar .crumbs a:hover { color: var(--text); }
  .topbar-crumbs .sep, .topbar .crumbs .sep { color: var(--muted-2); font-size: 13px; }
  .topbar-crumbs .here, .topbar .crumbs .here { color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .topbar-crumbs .mono, .topbar .crumbs .mono { font: 500 13px/1 var(--mono); color: var(--text-soft); letter-spacing: 0.02em; }
  .topbar-crumbs .root { background: transparent; color: var(--accent); padding: 0; width: auto; height: auto; }

  /* topbar-right: stays the trailing controls cluster */
  .topbar-right {
    display: inline-flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 13px;
  }
  .topbar-right form { margin: 0; }

  .top-search {
    display: flex; align-items: center; gap: 8px;
    height: 30px; padding: 0 10px;
    font: 500 12.5px/1 var(--sans);
    color: var(--muted);
    background: oklch(0.18 0.01 50);
    border: 1px solid var(--line);
    border-radius: 10px;
    cursor: text;
    min-width: 240px;
    transition: border-color .15s;
  }
  .top-search:hover { border-color: var(--line-2); }
  .top-search:focus-within { border-color: var(--accent-line); }
  .top-search svg { width: 14px; height: 14px; color: var(--muted); flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; }
  .top-search input {
    flex: 1; min-width: 0;
    background: none; border: 0; outline: none;
    font: inherit; color: var(--text);
  }
  .top-search input::placeholder { color: var(--muted); }
  .top-search .kbd { font-size: 10.5px; min-width: 0; height: 18px; padding: 0 5px; border-bottom-width: 1px; }

  .top-icon {
    display: grid; place-items: center;
    width: 32px; height: 32px;
    border-radius: 9px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    background: transparent; border: 0;
    transition: background .12s, color .12s;
  }
  .top-icon:hover { background: var(--bg-2); color: var(--text-soft); }
  .top-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.7; }

  .top-mascot {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 11px;
    border: 1px solid var(--line);
    background: oklch(0.18 0.01 50);
    flex-shrink: 0; cursor: pointer;
    transition: transform .15s, border-color .15s;
    text-decoration: none;
  }
  .top-mascot:hover { transform: translateY(-1px); border-color: var(--accent-line); }
  .top-mascot.bounce { animation: chonk-bounce 2.4s ease-in-out infinite; }
  @keyframes chonk-bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  .vsep { width: 1px; height: 18px; background: var(--line); align-self: center; flex-shrink: 0; }

  /* toolbar v2 — bar of filter input + seg buttons + right-aligned mono meta. */
  .toolbar-v2 {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; margin-bottom: 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    flex-wrap: wrap;
  }
  .toolbar-v2 .input {
    height: 30px; padding: 0 11px;
    font: 500 12.5px/1 var(--sans);
    color: var(--text);
    background: oklch(0.18 0.01 50);
    border: 1px solid var(--line);
    border-radius: 8px;
    min-width: 200px;
    outline: none;
  }
  .toolbar-v2 .input:focus { border-color: var(--accent-line); }
  .toolbar-v2 .right { margin-left: auto; }
  .toolbar-v2 .mono {
    font: 500 11px/1 var(--mono); letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted);
  }

  .seg {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 9px;
    overflow: hidden;
  }
  .seg button, .seg a {
    padding: 5px 11px;
    font: 500 12px/1 var(--mono); letter-spacing: 0.02em;
    color: var(--muted);
    background: transparent; border: 0;
    border-right: 1px solid var(--line);
    cursor: pointer; text-decoration: none;
  }
  .seg button:last-child, .seg a:last-child { border-right: 0; }
  .seg button.active, .seg a.active { background: var(--bg-2); color: var(--accent); }
  .seg button:hover:not(.active), .seg a:hover:not(.active) { background: var(--bg-2); color: var(--text-soft); }

  /* col-tabs (collection inner tabs — pill-shape v2, supersedes .tabs/.tab) */
  .col-tabs {
    display: inline-flex; gap: 2px;
    padding: 4px;
    margin-bottom: 18px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
  }
  .col-tab {
    padding: 6px 14px;
    border-radius: 8px;
    font: 500 12.5px/1 var(--sans);
    color: var(--muted);
    text-decoration: none;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
    transition: background .12s, color .12s;
  }
  .col-tab:hover { color: var(--text-soft); }
  .col-tab.on, .col-tab.active {
    background: var(--bg-2); color: var(--text);
    box-shadow: inset 0 0 0 1px var(--line-2);
  }
  .col-tab .mono { font: 500 10px/1 var(--mono); color: var(--muted-2); }

  /* schema-row — 7-col grid used in the Schema tab of a collection. */
  .schema-row {
    display: grid;
    grid-template-columns: 18px 1.6fr 1fr 60px 1.2fr 1.4fr 32px;
    align-items: center; gap: 12px;
    padding: 10px 14px;
    border-top: 1px solid var(--line-2);
    font: 500 12.5px/1.4 var(--sans);
  }
  .schema-row.head {
    border-top: 0;
    border-bottom: 1px solid var(--line);
    background: var(--bg-2);
    font: 500 10px/1 var(--mono);
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .schema-row .drag { color: var(--muted-2); cursor: grab; text-align: center; }
  .schema-row .fld-name {
    font: 500 13px/1 var(--mono); color: var(--text); letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 7px;
  }
  .schema-row .fld-type { font: 500 11.5px/1 var(--mono); color: var(--accent); }
  .schema-row .fld-null { text-align: center; color: var(--muted); }
  .schema-row .fld-null.yes { color: var(--ok); }
  .schema-row .fld-null.no  { color: var(--danger); }
  .schema-row .fld-default { font: 500 11.5px/1 var(--mono); color: var(--text-soft); }
  .schema-row .fld-desc { font: 400 12px/1.4 var(--sans); color: var(--muted); }

  /* timeline (audit / activity) */
  .tl { display: flex; flex-direction: column; gap: 0; }
  .tl-row {
    display: grid;
    grid-template-columns: 80px 22px 1fr auto;
    align-items: flex-start; gap: 12px;
    padding: 10px 0;
  }
  .tl-row + .tl-row { border-top: 1px dashed var(--line-2); }
  .tl-time {
    font: 500 11px/1.3 var(--mono); color: var(--muted);
    text-align: right; padding-top: 2px;
  }
  .tl-glyph {
    width: 22px; height: 22px; border-radius: 7px;
    display: grid; place-items: center;
    background: var(--bg-2); border: 1px solid var(--line);
    color: var(--muted);
    font: 500 11px/1 var(--mono);
    flex-shrink: 0;
  }
  .tl-glyph.ok   { color: var(--ok);     border-color: var(--ok-line);     background: var(--ok-soft); }
  .tl-glyph.warn { color: var(--warn);   border-color: var(--warn-line);   background: var(--warn-soft); }
  .tl-glyph.fail { color: var(--danger); border-color: var(--danger-line); background: var(--danger-soft); }
  .tl-body { font: 400 13px/1.5 var(--sans); color: var(--text-soft); min-width: 0; }
  .tl-body b { color: var(--text); font-weight: 500; }
  .tl-body code {
    font: 500 11.5px/1 var(--mono); color: var(--text);
    background: var(--bg-2); padding: 1px 6px; border-radius: 5px;
    border: 1px solid var(--line);
  }
  .tl-meta { font: 500 10.5px/1.4 var(--mono); color: var(--muted); text-align: right; }

  /* tenant cell + avatar tones (tenants list table) */
  .ten-cell { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .ten-avatar {
    width: 28px; height: 28px; border-radius: 9px;
    display: grid; place-items: center;
    color: #fff;
    font: 700 10.5px/1 var(--mono); letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .ten-meta { min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .ten-name { font: 500 13px/1.2 var(--sans); color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; }
