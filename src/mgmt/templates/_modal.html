<div class="modal-overlay" id="drust-modal" hidden role="dialog" aria-modal="true" aria-labelledby="drust-modal-title">
  <div class="modal" id="drust-modal-box">
    <h2 class="modal-title" id="drust-modal-title"></h2>
    <div class="modal-body" id="drust-modal-body"></div>
    <input type="text" class="modal-input" id="drust-modal-input" hidden>
    <div class="modal-actions" id="drust-modal-actions"></div>
  </div>
</div>
<script>
  // Shared UI modal — replaces native alert() / confirm() / prompt().
  // Usage:
  //   drustUI.alert({title, body, codeBlock?})
  //   drustUI.confirm({title, body, okText?, danger?}) -> Promise<bool>
  //   drustUI.prompt({title, body, placeholder?, default?, okText?}) -> Promise<string|null>
  (function () {
    var overlay = document.getElementById('drust-modal');
    var box = document.getElementById('drust-modal-box');
    var titleEl = document.getElementById('drust-modal-title');
    var bodyEl = document.getElementById('drust-modal-body');
    var inputEl = document.getElementById('drust-modal-input');
    var actionsEl = document.getElementById('drust-modal-actions');
    var closeCb = null;

    function close(value) {
      overlay.hidden = true;
      box.classList.remove('modal-variant-danger');
      box.classList.remove('modal-wide');
      inputEl.hidden = true;
      inputEl.value = '';
      actionsEl.innerHTML = '';
      bodyEl.innerHTML = '';
      var cb = closeCb;
      closeCb = null;
      if (cb) cb(value);
    }
    function btn(label, variant, onClick) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'btn ' + (variant || 'ghost');
      b.textContent = label;
      b.addEventListener('click', onClick);
      return b;
    }
    function setBody(body, codeBlock) {
      if (body) bodyEl.textContent = body;
      if (codeBlock) {
        var wrap = document.createElement('div');
        wrap.className = 'modal-code-wrap';
        var code = document.createElement('code');
        code.textContent = codeBlock;
        var copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'modal-code-copy';
        copyBtn.setAttribute('aria-label', '{{ t.s("common.button.copy_to_clipboard") }}');
        copyBtn.title = '{{ t.s("common.button.copy_to_clipboard") }}';
        copyBtn.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#i-copy"/></svg>';
        copyBtn.addEventListener('click', function () {
          navigator.clipboard.writeText(codeBlock).then(function () {
            copyBtn.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#i-check"/></svg>';
            copyBtn.classList.add('is-ok');
            setTimeout(function () {
              copyBtn.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#i-copy"/></svg>';
              copyBtn.classList.remove('is-ok');
            }, 1500);
          });
        });
        wrap.appendChild(code);
        wrap.appendChild(copyBtn);
        bodyEl.appendChild(wrap);
      }
    }
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) close(null);
    });
    document.addEventListener('keydown', function (e) {
      if (overlay.hidden) return;
      if (e.key === 'Escape') { e.preventDefault(); close(null); }
    });

    window.drustUI = {
      alert: function (opts) {
        opts = opts || {};
        titleEl.textContent = opts.title || '{{ t.s("common.modal.title_notice") }}';
        setBody(opts.body, opts.codeBlock);
        inputEl.hidden = true;
        actionsEl.innerHTML = '';
        actionsEl.appendChild(btn('{{ t.s("common.button.ok") }}', 'primary', function () { close(true); }));
        overlay.hidden = false;
        if (opts.danger) box.classList.add('modal-variant-danger');
        setTimeout(function () { actionsEl.querySelector('button').focus(); }, 20);
      },
      confirm: function (opts) {
        opts = opts || {};
        return new Promise(function (resolve) {
          closeCb = resolve;
          titleEl.textContent = opts.title || '{{ t.s("common.modal.title_confirm") }}';
          setBody(opts.body);
          inputEl.hidden = true;
          actionsEl.innerHTML = '';
          actionsEl.appendChild(btn('{{ t.s("common.button.cancel") }}', 'ghost', function () { close(false); }));
          var okVariant = opts.danger ? 'danger' : 'primary';
          actionsEl.appendChild(btn(opts.okText || '{{ t.s("common.button.ok") }}', okVariant, function () { close(true); }));
          if (opts.danger) box.classList.add('modal-variant-danger');
          overlay.hidden = false;
          setTimeout(function () { actionsEl.lastChild.focus(); }, 20);
        });
      },
      prompt: function (opts) {
        opts = opts || {};
        return new Promise(function (resolve) {
          closeCb = resolve;
          titleEl.textContent = opts.title || '{{ t.s("common.modal.title_input") }}';
          setBody(opts.body);
          inputEl.hidden = false;
          inputEl.value = opts.default || '';
          inputEl.placeholder = opts.placeholder || '';
          actionsEl.innerHTML = '';
          actionsEl.appendChild(btn('{{ t.s("common.button.cancel") }}', 'ghost', function () { close(null); }));
          actionsEl.appendChild(btn(opts.okText || '{{ t.s("common.button.ok") }}', 'primary', function () { close(inputEl.value); }));
          inputEl.addEventListener('keydown', function handler(e) {
            if (e.key === 'Enter') { e.preventDefault(); inputEl.removeEventListener('keydown', handler); close(inputEl.value); }
          });
          overlay.hidden = false;
          setTimeout(function () { inputEl.focus(); inputEl.select(); }, 20);
        });
      }
      ,
      detail: function (opts) {
        opts = opts || {};
        titleEl.textContent = opts.title || '{{ t.s("common.modal.title_details") }}';
        // v1.32.10 — `opts.wide` widens the modal box (~720px vs the
        // default 460px) for single-value cell viewers where every
        // line counts. Cleared in close() so the next open reverts.
        if (opts.wide) box.classList.add('modal-wide');
        // Build the <dl> grid from fields[].
        var dl = document.createElement('dl');
        dl.className = 'modal-detail-grid';
        var fields = opts.fields || [];
        for (var i = 0; i < fields.length; i++) {
          var f = fields[i] || {};
          var dt = document.createElement('dt');
          dt.textContent = f.label || '';
          var dd = document.createElement('dd');
          // v1.32.10 — `f.textarea: true` renders the value inside a
          // readonly resizable <textarea>, then promotes dd to span
          // the full grid width so the editor is wide enough to read
          // naturally. Used by the collection-rows cell-expand modal
          // for Supabase-style long-content viewing. NULL still
          // renders as the literal sentinel so the user sees that
          // the underlying cell IS null rather than "empty editor".
          if (f.textarea) {
            dd.classList.add('full-span');
            var ta = document.createElement('textarea');
            ta.className = 'modal-detail-area';
            ta.readOnly = true;
            ta.spellcheck = false;
            ta.value = f.value == null ? 'NULL' : String(f.value);
            dd.appendChild(ta);
          } else if (f.code) {
            var pre = document.createElement('pre');
            pre.textContent = f.value == null ? '' : String(f.value);
            dd.appendChild(pre);
          } else {
            if (f.mono) dd.className = 'mono';
            dd.textContent = f.value == null ? '' : String(f.value);
          }
          dl.appendChild(dt);
          dl.appendChild(dd);
        }
        bodyEl.innerHTML = '';
        bodyEl.appendChild(dl);
        inputEl.hidden = true;
        actionsEl.innerHTML = '';
        var actions = opts.actions;
        if (actions && actions.length) {
          for (var j = 0; j < actions.length; j++) {
            (function (a) {
              var variant = a.variant || 'ghost';
              actionsEl.appendChild(btn(a.label || '{{ t.s("common.button.ok") }}', variant, function () {
                if (a.onClick) { try { a.onClick(); } catch (e) {} }
                close(null);
              }));
            })(actions[j]);
          }
        } else {
          actionsEl.appendChild(btn('{{ t.s("common.button.close") }}', 'ghost', function () { close(null); }));
        }
        overlay.hidden = false;
        setTimeout(function () {
          var firstBtn = actionsEl.querySelector('button');
          if (firstBtn) firstBtn.focus();
        }, 20);
      }
    };
  })();
</script>
