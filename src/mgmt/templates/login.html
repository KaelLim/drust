<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drust — sign in</title>
{% include "_styles.html" %}
</head>
<body style="padding:0;">
{% include "_icons.html" %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <span class="dots"><i></i><i></i><i></i></span>
      <span class="title">drust — sign in</span>
    </div>
    <div class="auth-body">
      <div class="brand">
        <span class="logo">drust</span>
        <span class="tag">multi-tenant sqlite baas</span>
      </div>
      <h1>Sign in to continue</h1>
      <div class="sub">internal tool · Tzu Chi Foundation</div>

      {% if let Some(err) = error %}
      <div style="margin-bottom:14px;">
        <div class="alert error">
          <div class="icon">✕</div>
          <div class="msg">{{ err }}</div>
          <span></span>
        </div>
      </div>
      {% endif %}

      <form method="post" action="/drust/login">
        <div class="field">
          <label>username</label>
          <div class="input-prefix">
            <span class="prefix">@</span>
            <input class="input" name="username" placeholder="admin" required autofocus autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label>password</label>
          <input class="input" type="password" name="password" placeholder="••••••••••••" required autocomplete="off">
        </div>
        <div class="submit-row">
          <span class="hint">press <span class="kbd-key">↵</span> to sign in</span>
          <button class="btn btn-primary" type="submit">Sign in →</button>
        </div>
      </form>
    </div>
    <div class="auth-foot">
      <span>drust v{{ version }}</span>
      <span>forgot password? ask admin</span>
    </div>
  </div>
</div>
</body>
</html>
