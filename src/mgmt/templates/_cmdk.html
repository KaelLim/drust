<!-- _cmdk.html — global cmd-K palette (2026-05-17 mockup).
     Include near end of body on every admin page. ⌘K / Ctrl+K toggles
     the overlay; ESC closes; ↑/↓ navigate; ↵ activates the highlighted
     item. CSS in _styles.html (.cmdk-overlay, .cmdk, .cmdk-*).

     Tenant list is fetched lazily on first open from
     /drust/admin/api/cmdk/tenants and cached for the rest of the
     session. Static actions are inlined below.

     Exposes: window.drustCmdK = { open(), close() }. -->
<div class="cmdk-overlay" id="cmdk-overlay" hidden onclick="if(event.target===this)drustCmdK.close()">
  <div class="cmdk">
    <input class="cmdk-input" id="cmdk-input" placeholder="{{ t.s("cmdk.input.placeholder") }}" autocomplete="off">
    <div class="cmdk-list" id="cmdk-list"></div>
    <div style="padding:8px 16px;border-top:1px solid var(--line);font:500 10.5px/1 var(--mono);color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;display:flex;gap:14px;align-items:center;">
      <span><span class="kbd" style="height:18px;min-width:0;padding:0 5px;font-size:10.5px;">↑↓</span> {{ t.s("cmdk.hint.navigate") }}</span>
      <span><span class="kbd" style="height:18px;min-width:0;padding:0 5px;font-size:10.5px;">↵</span> {{ t.s("cmdk.hint.open") }}</span>
      <span style="margin-left:auto;">{{ t.s("cmdk.hint.shortcut") }}</span>
    </div>
  </div>
</div>
<script>
(function() {
  var tenantCache = null;
  var allItems = [];
  var filtered = [];
  var selIx = 0;

  function $(id) { return document.getElementById(id); }
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function av(name) {
    // map first char of slug to 1..6
    var ix = (name.charCodeAt(0) || 0) % 6 + 1;
    return ix;
  }

  function fetchTenants() {
    if (tenantCache) return Promise.resolve(tenantCache);
    return fetch('/drust/admin/api/cmdk/tenants', { credentials:'same-origin' })
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(arr) {
        tenantCache = arr.map(function(t) {
          return { kind:'tenant', name:t.name, id:t.id, av:av(t.name),
                   href:'/drust/admin/tenants/' + t.id + '/_overview' };
        });
        return tenantCache;
      })
      .catch(function() { return []; });
  }

  function applyFilter() {
    var q = ($('cmdk-input').value || '').toLowerCase().trim();
    filtered = allItems.filter(function(it) {
      if (!q) return true;
      var hay = (it.label || it.name || '') + ' ' + (it.id || '');
      return hay.toLowerCase().indexOf(q) >= 0;
    });
    selIx = 0;
    render();
  }

  function render() {
    var list = $('cmdk-list');
    if (filtered.length === 0) {
      list.innerHTML = '<div style="padding:24px;color:var(--muted);text-align:center;font:400 13px/1 var(--sans);">{{ t.s("cmdk.empty.no_matches") }}</div>';
      return;
    }
    var html = '';
    filtered.forEach(function(it, ix) {
      var on = ix === selIx ? ' on' : '';
      var initial = (it.name || 'T').slice(0, 1).toUpperCase();
      html += '<a class="cmdk-item' + on + '" href="' + it.href + '" data-ix="' + ix + '">'
        + '<span class="ten-avatar av-' + it.av + '" style="width:24px;height:24px;border-radius:7px;font-size:11px;">' + esc(initial) + '</span>'
        + '<span class="cmdk-label" style="display:flex;flex-direction:column;gap:1px;min-width:0;">'
          + '<span style="font:500 13px/1.2 var(--sans);color:var(--text);">' + esc(it.name) + '</span>'
          + '<span style="font:500 10.5px/1 var(--mono);color:var(--muted);letter-spacing:0.04em;">' + esc(it.id) + '</span>'
        + '</span>'
        + '<span class="cmdk-hint">↵</span></a>';
    });
    list.innerHTML = html;
    Array.from(list.querySelectorAll('.cmdk-item')).forEach(function(el) {
      el.addEventListener('mouseenter', function() {
        selIx = parseInt(el.dataset.ix, 10);
        Array.from(list.querySelectorAll('.cmdk-item')).forEach(function(x, i) { x.classList.toggle('on', i === selIx); });
      });
    });
  }

  function open() {
    $('cmdk-overlay').hidden = false;
    setTimeout(function() { $('cmdk-input').focus(); }, 20);
    fetchTenants().then(function(tenants) {
      allItems = tenants;
      applyFilter();
    });
  }
  function close() {
    $('cmdk-overlay').hidden = true;
    $('cmdk-input').value = '';
  }

  window.drustCmdK = { open: open, close: close };
  window.cmdkHide = close;   // legacy alias

  document.addEventListener('keydown', function(e) {
    var isOpen = !$('cmdk-overlay').hidden;
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      isOpen ? close() : open();
      return;
    }
    if (!isOpen) return;
    if (e.key === 'Escape') { e.preventDefault(); close(); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selIx = Math.min(selIx + 1, Math.max(0, filtered.length - 1));
      render();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selIx = Math.max(selIx - 1, 0);
      render();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (filtered[selIx]) { window.location.href = filtered[selIx].href; }
    }
  });

  $('cmdk-input').addEventListener('input', applyFilter);
})();
</script>
