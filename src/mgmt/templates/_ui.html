{# Admin UI component library (spec 2026-07-20).

   Usage:  {% import "_ui.html" as ui %}
           {% call ui::view_head(eyebrow, title, sub) %}<button …>{% endcall %}

   Every macro takes plain values and relies on askama's automatic HTML
   escaping -- never use the safe filter inside this file (gate 5). The
   caller body,
   where a macro accepts one, is template-authored markup and is rendered
   via `caller()`.

   See drust/CLAUDE.md "Admin 頁面解剖學" for the canonical page shape. #}

{# Page header: eyebrow + title + subtitle on the left, caller body (action
   buttons) on the right. Replaces the 12 hand-rolled headers and the 12
   `_tenant_eyebrow.html` includes with one shape. Pass an empty string for
   `sub` to omit the subtitle line. #}
{% macro view_head(eyebrow, title, sub) %}
<div class="view-head">
  <div class="grow">
    <div class="eyebrow">{{ eyebrow }}</div>
    <h1 class="view-title">{{ title }}</h1>
    {% if sub != "" %}<p class="view-sub">{{ sub }}</p>{% endif %}
  </div>
  {{ caller() }}
</div>
{% endmacro %}

{# Data table shell. The ONLY canonical table class is `data`; a page that
   invents its own (`grid-table`) both loses the styling and needs inline
   style rescue -- which is exactly how cron_admin and tenant_functions
   drifted. Caller body supplies <thead> and <tbody>: column widths and
   headings are legitimately per-page. #}
{% macro data_table(caption) %}
<table class="data">
  {% if caption != "" %}<caption>{{ caption }}</caption>{% endif %}
  {{ caller() }}
</table>
{% endmacro %}

{# Empty state. `chonk` selects the LiveChonk mascot pose (see _mascot.html);
   pass "" to omit the mascot. Caller body renders any call-to-action. #}
{% macro empty_state(chonk, title, sub) %}
<div class="empty empty-pad">
  {% if chonk != "" %}
  <div class="empty-figure">
    <canvas class="pix" data-chonk="{{ chonk }}" data-size="96"></canvas>
  </div>
  {% endif %}
  <h3>{{ title }}</h3>
  {% if sub != "" %}<p>{{ sub }}</p>{% endif %}
  {{ caller() }}
</div>
{% endmacro %}

{# Toolbar row above a table: filter chips, sort, per-page. Canonical class
   is `toolbar`; `toolbar-v2` is a retired alias. #}
{% macro toolbar() %}
<div class="toolbar">
  {{ caller() }}
</div>
{% endmacro %}

{# Panel container. Pass "" for `sub` to omit the subtitle. Caller body is
   the card body -- wrap it in `.card-body` yourself when you want padding,
   or supply a bare <table> for a flush table card. #}
{% macro card(title, sub) %}
<div class="card">
  <div class="card-head">
    <div>
      <div class="card-title">{{ title }}</div>
      {% if sub != "" %}<div class="card-sub">{{ sub }}</div>{% endif %}
    </div>
  </div>
  {{ caller() }}
</div>
{% endmacro %}

{# One labelled form control. Caller body is the <input>/<select>/<textarea>.
   Pass "" for `hint` to omit the helper line. #}
{% macro form_row(label, hint) %}
<div class="field">
  <label>{{ label }}</label>
  {{ caller() }}
  {% if hint != "" %}<div class="hint">{{ hint }}</div>{% endif %}
</div>
{% endmacro %}
