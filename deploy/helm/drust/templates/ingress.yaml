{{- $rewrite := .Values.ingress.hostRewrite -}}
{{- if eq .Values.ingress.controller "traefik" }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-hostrewrite
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drust.labels" . | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      Host: {{ $rewrite | quote }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drust.labels" . | nindent 4 }}
  annotations:
    {{- if eq .Values.ingress.controller "traefik" }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ .Release.Name }}-hostrewrite@kubernetescrd
    {{- else if eq .Values.ingress.controller "nginx" }}
    nginx.ingress.kubernetes.io/upstream-vhost: {{ $rewrite }}
    {{- end }}
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ include "drust.tlsSecret" . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if and .Values.storage.enabled .Values.publicFiles.enabled }}
          - path: /public
            pathType: Prefix
            backend:
              service:
                name: {{ include "minio.svcName" . }}
                port: { number: 9000 }
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "drust.svcName" . }}
                port: { number: 47826 }
