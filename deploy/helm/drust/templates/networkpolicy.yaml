{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-drust
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drust.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "drust.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace }}
      ports:
        - { protocol: TCP, port: 47826 }
  egress:
    # DNS — scoped to the cluster DNS namespace (not every namespace) so port-53
    # can't be a covert channel to a co-tenant pod.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    {{- if .Values.storage.enabled }}
    # drust -> own MinIO (same namespace)
    - to:
        - podSelector:
            matchLabels:
              {{- include "minio.selectorLabels" . | nindent 14 }}
      ports:
        - { protocol: TCP, port: 9000 }
    {{- end }}
    {{- if .Values.networkPolicy.allowInternetEgress }}
    # Internet (OAuth / webhooks / http-fetch) — everything EXCEPT cluster CIDRs,
    # so other groups' pods/services stay unreachable. drust's PinnedPublicResolver
    # is the second SSRF layer.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              {{- range .Values.networkPolicy.clusterCIDRs }}
              - {{ . }}
              {{- end }}
    {{- end }}
{{- if .Values.storage.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-minio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drust.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "minio.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "drust.selectorLabels" . | nindent 14 }}
        # minio-init hook Job carries its own labels (NOT drust's — see the
        # Job template) and needs to reach MinIO to create buckets.
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio-init
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - { protocol: TCP, port: 9000 }
    {{- if .Values.publicFiles.enabled }}
    # public-file GETs arrive from the ingress controller via the /public path,
    # not from drust — allow that source too when public serving is on.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace }}
      ports:
        - { protocol: TCP, port: 9000 }
    {{- end }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- end }}
{{- end }}
