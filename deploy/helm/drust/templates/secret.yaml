{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drust.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-username: {{ .Values.secrets.adminUser | quote }}
  admin-password: {{ required "secrets.adminPassword required (or set secrets.create=false)" .Values.secrets.adminPassword | quote }}
  {{- if .Values.storage.enabled }}
  s3-access-key: {{ .Values.storage.minio.rootUser | quote }}
  s3-secret-key: {{ required "storage.minio.rootPassword required when storage.enabled" .Values.storage.minio.rootPassword | quote }}
  admin-endpoint: {{ .Values.storage.adminEndpointPlaceholder | quote }}
  admin-token: {{ .Values.storage.adminTokenPlaceholder | quote }}
  {{- end }}
{{- end }}
