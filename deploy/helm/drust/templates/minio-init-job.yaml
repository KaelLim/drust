{{- if .Values.storage.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drust.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        # Dedicated labels — MUST NOT reuse drust.selectorLabels: the drust
        # Service selects on those, and a probeless Job pod counts as Ready,
        # so it would be added to the drust endpoints and eat live traffic.
        app.kubernetes.io/name: minio-init
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: mc
          image: {{ .Values.storage.minio.mcImage | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          env:
            # mc's default HOME (/root) is unwritable for a non-root uid; point its
            # config dir at the writable /tmp so `mc` can init under runAsNonRoot.
            - { name: HOME, value: /tmp }
            - { name: MC_CONFIG_DIR, value: /tmp/.mc }
            # AK/SK MUST precede MC_HOST_drust: kubelet $(VAR) expansion only
            # sees variables defined EARLIER in this list — the reverse order
            # leaves the literal string "$(AK):$(SK)" in the URL.
            - name: AK
              valueFrom: { secretKeyRef: { name: {{ include "drust.secretName" . }}, key: s3-access-key } }
            - name: SK
              valueFrom: { secretKeyRef: { name: {{ include "drust.secretName" . }}, key: s3-secret-key } }
            - name: MC_HOST_drust
              value: "http://$(AK):$(SK)@minio.{{ .Release.Namespace }}.svc:9000"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              until mc ls drust >/dev/null 2>&1; do echo "waiting for minio..."; sleep 2; done
              # Bucket names are FIXED: drust's write path hardcodes "public"/"private"
              # (src/storage/files.rs bucket_for) — GARAGE_PUBLIC_BUCKET only affects the
              # boot ping, so these must not be parameterized.
              mc mb --ignore-existing drust/public
              mc mb --ignore-existing drust/private
              {{- if .Values.publicFiles.enabled }}
              mc anonymous set download drust/public
              {{- end }}
              echo "minio-init done"
{{- end }}
