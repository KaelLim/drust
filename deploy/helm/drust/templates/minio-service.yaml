{{- if .Values.storage.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio.svcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drust.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "minio.selectorLabels" . | nindent 4 }}
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
{{- end }}
