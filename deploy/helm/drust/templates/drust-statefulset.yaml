apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "drust.svcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drust.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "drust.svcName" . }}
  replicas: 1                       # single-writer invariant — NEVER > 1
  selector:
    matchLabels:
      {{- include "drust.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "drust.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: drust
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 47826
          env:
            - { name: DRUST_DATA_DIR, value: /data }
            - { name: DRUST_LOG_DIR, value: /logs }
            - { name: DRUST_BIND, value: "0.0.0.0:47826" }
            - { name: DRUST_BASE_PATH, value: "" }
            - name: DRUST_INIT_ADMIN_USERNAME
              valueFrom: { secretKeyRef: { name: {{ include "drust.secretName" . }}, key: admin-username } }
            - name: DRUST_INIT_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "drust.secretName" . }}, key: admin-password } }
            {{- if .Values.storage.enabled }}
            - name: GARAGE_S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: {{ include "drust.secretName" . }}, key: s3-access-key } }
            - name: GARAGE_S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: {{ include "drust.secretName" . }}, key: s3-secret-key } }
            - name: GARAGE_ADMIN_ENDPOINT
              valueFrom: { secretKeyRef: { name: {{ include "drust.secretName" . }}, key: admin-endpoint } }
            - name: GARAGE_ADMIN_TOKEN
              valueFrom: { secretKeyRef: { name: {{ include "drust.secretName" . }}, key: admin-token } }
            {{- end }}
            {{- if .Values.hideVersion }}
            - { name: DRUST_HIDE_VERSION, value: "1" }
            {{- end }}
            - { name: RUST_LOG, value: {{ .Values.logLevel | quote }} }
            {{- if .Values.publicUrl }}
            - { name: DRUST_PUBLIC_URL, value: {{ .Values.publicUrl | quote }} }
            {{- end }}
            {{- if .Values.storage.enabled }}
            - { name: GARAGE_S3_ENDPOINT, value: {{ include "minio.endpoint" . | quote }} }
            # FIXED literal: drust's write path hardcodes bucket "public" (files.rs).
            - { name: GARAGE_PUBLIC_BUCKET, value: "public" }
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /health, port: 47826 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 47826 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.drust | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: logs, mountPath: /logs }
            - { name: tmp, mountPath: /tmp }
        {{- if .Values.maintenance.sidecar.enabled }}
        - name: maintenance
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          env:
            - { name: DRUST_DATA_DIR, value: /data }
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                # run at ~04:00 UTC: sleep the remaining seconds of the day past 04:00
                now=$(date -u +%s); mid=$(( (now/86400)*86400 )); tgt=$(( mid + 14400 ))
                [ "$now" -ge "$tgt" ] && tgt=$(( tgt + 86400 ))
                sleep $(( tgt - now ))
                echo "[maintenance] running drust_session_janitor"
                drust_session_janitor || echo "[maintenance] janitor exited non-zero"
                # reclaim soft-deleted tenant dirs (spec §9 trash sweep). Non-fatal:
                # if the slim image lacks `find`, the loop keeps running the janitor.
                find /data/_trash -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} + 2>/dev/null \
                  || echo "[maintenance] trash sweep skipped"
              done
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: tmp, mountPath: /tmp }
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.data }}
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.logs }}
